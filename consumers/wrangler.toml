name = "avatok-consumers"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Async layer (Phase 4): consumes all 4 queues + runs cron cleanup. Producers are
# avatok-api (moderation/push/email/analytics) and avatok-relay (push).

[observability]
enabled = true

[[d1_databases]]
binding = "DB_META"
database_name = "avatok-meta"
database_id = "c4ec8c0e-e1ac-4a1d-8e41-636f4007871b"

[[d1_databases]]
binding = "DB_MEDIA"
database_name = "avatok-media-meta"
database_id = "79dc846e-8d9c-416a-8927-39c7aebdc400"

[[d1_databases]]
binding = "DB_MODERATION"
database_name = "avatok-moderation"
database_id = "770d5709-2974-447e-b4e8-8c43f22df997"

[[d1_databases]]
binding = "DB_BRAIN"
database_name = "avatok-brain"
database_id = "f5bfb712-5151-4e9f-b47a-20d76465f205"

# Wallet audit trail — wallet-transactions consumer writes the ledger + mirrors.
[[d1_databases]]
binding = "DB_WALLET"
database_name = "avatok-wallet"
database_id = "63d7181c-0539-4ff2-8690-4ff9bb785457"

# Read image bytes to scan; delete on rejection. Also the delete cascade wipes
# the user's per-prefix blobs.
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "avatok-blobs"

# Locked verification bucket — delete cascade wipes selfie videos.
[[r2_buckets]]
binding = "VERIFICATION"
bucket_name = "avatok-verification"

# Private OLX digital goods — delete cascade wipes a seller's product files.
[[r2_buckets]]
binding = "DIGITAL"
bucket_name = "avatok-digital"

# Agent TTS cache — delete cascade wipes a user's agent audio.
[[r2_buckets]]
binding = "AGENT_AUDIO"
bucket_name = "avatok-agent-audio"

# Phase 1 (ABLY-R2): durable chat archive lives in the PRIVATE backup bucket
# (no public access), key chat/<conv>/<serial>.json. Reuses avatok-backup so no
# new bucket needs provisioning; can be split to a dedicated bucket later.
[[r2_buckets]]
binding = "BACKUP_R2"
bucket_name = "avatok-backup"

# FCM access-token cache (ephemeral) — Rulebook-allowed KV use.
[[kv_namespaces]]
binding = "TOKENS"
id = "ab462ef0fdad44d08fd11263577b31f5"

# Workers AI — image moderation classifier + brain extraction/embeddings.
[ai]
binding = "AI"

# Vectorize — semantic memory for AvaBrain (384-dim, matches avatok-semantic).
[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "avatok-semantic"

# AI Search — sharded per-user memory/file index. The account-deletion cascade
# deletes a user's docs from their shard(s) by item id (tracked in DB_META
# ava_search_items). See Specs/PROPOSAL-AI-SEARCH-SHARDING.md.
[[ai_search_namespaces]]
binding = "AI_SEARCH"
namespace = "default"

# Analytics Engine — operational metrics (AI scan cost/latency, push success, cron).
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "avatok_metrics"

# --- Queue consumers (one Worker, dispatch on batch.queue) ---
[[queues.consumers]]
queue = "moderation"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

[[queues.consumers]]
queue = "push-notifications"
max_batch_size = 10
max_batch_timeout = 2
max_retries = 5

[[queues.consumers]]
queue = "email"
max_batch_size = 10
max_batch_timeout = 10
max_retries = 3

[[queues.consumers]]
queue = "analytics"
max_batch_size = 50
max_batch_timeout = 15
max_retries = 2

# AvaBrain background extraction (8B LLM + embeddings). Small batches keep LLM
# latency per message bounded; retries are cheap (idempotent upserts).
[[queues.consumers]]
queue = "brain-events"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 3

# Account-deletion cascade (§10.5). Small batches; each message wipes 15 stores.
[[queues.consumers]]
queue = "account-deletions"
max_batch_size = 1
max_batch_timeout = 10
max_retries = 3

# Wallet audit trail (Phase 2). WalletDO → D1 ledger + mirrors. Idempotent on id.
[[queues.consumers]]
queue = "wallet-transactions"
max_batch_size = 20
max_batch_timeout = 5
max_retries = 3

# Agent tasks (Phase 7). Triggers the ConversationDO turn loop. Small batches; each
# message runs several Gemma/llama-guard calls inside the DO.
[[queues.consumers]]
queue = "agent-tasks"
max_batch_size = 2
max_batch_timeout = 5
max_retries = 3

# Phase 1 (ABLY-R2): chat archive — write each message to R2 + D1 message_index.
# Idempotent on `serial`; 5 retries then the DLQ (so a chat is never silently lost).
# Create once: `wrangler queues create chat-archive` (+ chat-archive-dlq).
[[queues.consumers]]
queue = "chat-archive"
max_batch_size = 25
max_batch_timeout = 5
max_retries = 5
dead_letter_queue = "chat-archive-dlq"

[[queues.consumers]]
queue = "chat-archive-dlq"
max_batch_size = 10
max_retries = 3

# Cross-script DO binding → avatok-api's ConversationDO (run the agent turn loop).
[[durable_objects.bindings]]
name = "CONVERSATION_DO"
class_name = "ConversationDO"
script_name = "avatok-api"

# Cross-script DO binding → avatok-api's InboxDO (large-group "fanout" delivery:
# the router enqueues >25-recipient sends; this Worker appends to each inbox).
[[durable_objects.bindings]]
name = "INBOX"
class_name = "InboxDO"
script_name = "avatok-api"

# Cross-script DO binding -> avatok-api's WalletDO (Phase 2: nightly recon reads
# the authoritative balance+held per user to compare against the ledger sum).
[[durable_objects.bindings]]
name = "WALLET_DO"
class_name = "WalletDO"
script_name = "avatok-api"

# Calendar reminders re-enqueue to the push queue (Phase 3). This Worker is both a
# producer (cron reminders) and consumer (push-notifications) of this queue.
[[queues.producers]]
binding = "Q_PUSH"
queue = "push-notifications"

# Lifecycle events (account_deleted) → analytics batch. Producer + consumer here.
[[queues.producers]]
binding = "Q_MONEY"            # Phase 7 — sweep enqueues refund/settlement jobs
queue = "money-settlements"

[[queues.producers]]
binding = "Q_ANALYTICS"
queue = "analytics"

# Cron — reminders every 15m; heavy cleanup on the 6h tick (handler gates by cron).
[triggers]
crons = ["* * * * *", "*/15 * * * *", "0 */6 * * *"]  # minute = Phase 7 money sweep

# Secrets (wrangler secret put):
#   FCM_SERVICE_ACCOUNT  — Firebase service-account JSON (Android push)
#   BREVO_API_KEY        — transactional email (Brevo; replaced Resend)
#   POSTHOG_API_KEY      — analytics capture (+ POSTHOG_HOST var)
#   APNS_KEY_ID / APNS_TEAM_ID / APNS_PRIVATE_KEY / APNS_BUNDLE_ID  — iOS push
#                          (gated: unset → APNs tokens skipped, Android-first)
#   NSFW_API_URL / NSFW_API_KEY        — cheap external NSFW classifier first-pass
#                          (unset → all image scans go to Gemma 4)
#   CSAM_API_URL / CSAM_API_KEY        — CSAM matcher (PhotoDNA/Thorn). Unset → CSAM
#                          gate bypassed. Also load NCMEC/PhotoDNA sha256 lists into
#                          the csam_hashes table (DB_MODERATION) to activate the
#                          cheap exact-hash gate. (run migrations/csam_hashes.sql)
#   CSAM_REPORT_URL / CSAM_REPORT_KEY  — NCMEC-filing service for confirmed CSAM
#   OPENAI_API_KEY       — Whisper voice-note transcription (Phase 9; unset →
#                          voice notes are not indexed, everything else works)

[vars]
FCM_PROJECT = "avatok-e19ef"
# Workers AI daily budget alarm (Scale Phase 0): cron emails ALERT_EMAIL once/day
# when ai_spend.calls exceeds this.
AI_DAILY_CALL_BUDGET = "5000"
ALERT_EMAIL = "hdavy2005@gmail.com"
# Image moderation: Gemma 4 26B-A4B (MoE: 26B total / ~4B active per token → ~4B-
# class cost, far higher quality; native vision + thinking) rates NSFW + violence
# via prompt+parse. Text moderation: Llama Guard binary safe/unsafe classifier
# (purpose-built; kept). All on Workers AI; no OpenAI anywhere. Swappable.
MODERATION_MODEL = "@cf/google/gemma-4-26b-a4b-it"
MODERATION_MODEL_TYPE = "vision"   # "vision" | "classifier" (swap to a cheap NSFW classifier for lowest cost at scale)
TEXT_MODERATION_MODEL = "@cf/meta/llama-guard-3-8b"
POSTHOG_HOST = "https://eu.i.posthog.com"
BRAIN_EXTRACT_MODEL = "@cf/google/gemma-4-26b-a4b-it"       # MoE 26B/4B-active background extraction
BRAIN_EMBED_MODEL = "@cf/baai/bge-small-en-v1.5"            # 384-dim — matches avatok-semantic (embeddings stay on bge)
BRAIN_VISION_MODEL = "@cf/google/gemma-4-26b-a4b-it"        # Gemma 4 multimodal — AvaLibrary image caption/OCR/doc/chart/UI (replaces llava)

# ═══════════════════════════════════════════════════════════════════════════
# STAGING (creator-marketplace Phase 1, audit A1). Deploy:
#   wrangler deploy --env staging   → avatok-consumers-staging
