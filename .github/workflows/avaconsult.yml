name: AvaConsult build

# Separate paid app (RealtimeKit 1:20). Built on GitHub Actions; APK published
# to the "consult-latest" release for a stable direct download link.

# AUTO-BUILD ON PUSH IS DISABLED (owner decision 2026-07-04: "no auto build
# unless I say so"). Run manually from the Actions tab (Run workflow) or
# `gh workflow run avaconsult.yml`. Re-enable the `push:` block to resume.
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'avaconsult/**'
  #     - '.github/workflows/avaconsult.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  avaconsult:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin to the last stable BEFORE Flutter 3.44 (which marked IconData
          # `final` and broke phosphor_flutter 2.1.0). Matches android.yml.
          flutter-version: 3.41.x
          channel: stable
          cache: true

      - name: Generate android/ platform files
        working-directory: avaconsult
        run: flutter create --platforms=android --org ai.avatok --project-name avaconsult .

      - name: Configure Android (RealtimeKit)
        working-directory: avaconsult
        run: python3 tool/postcreate.py

      - name: Pub get
        working-directory: avaconsult
        run: flutter pub get

      - name: Analyze (non-blocking)
        working-directory: avaconsult
        run: flutter analyze || true

      - name: Build debug APK
        working-directory: avaconsult
        run: flutter build apk --debug

      - name: Stage APK
        run: |
          mkdir -p dist
          cp avaconsult/build/app/outputs/flutter-apk/app-debug.apk dist/avaconsult.apk
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avaconsult-apk
          path: dist/avaconsult.apk

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: consult-latest
          name: AvaConsult (latest)
          body: |
            AvaConsult — paid 1:20 group calling (RealtimeKit SFU). Debug APK for
            on-device testing. Install, Start/Join a consult with the same room
            code on multiple devices.
          files: dist/avaconsult.apk
