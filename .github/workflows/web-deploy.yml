# Build the avatok.ai web client (web/) and deploy it to the Cloudflare Pages
# project `avatok-app`. This repo's Pages project is NOT wired to Cloudflare's
# git integration, so a plain `git push` never updates the live site — this
# workflow is what makes a push to `main` actually deploy the website (the
# android.yml / macos.yml workflows only build the mobile apps).
#
# Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN  — token with "Cloudflare Pages: Edit" on the account
#   CLOUDFLARE_ACCOUNT_ID — the account id that owns avatok-app
name: Deploy web (Cloudflare Pages)

on:
  # NOTE: auto-deploy on push DISABLED (owner 2026-06-24: "no web, just apk").
  # Run manually from the Actions tab when a web deploy is needed. Re-enable the
  # push: block below to resume auto-deploy on web/ or core/ui changes.
  # push:
  #   branches: [main]
  #   paths:
  #     - 'web/**'
  #     - 'app/lib/core/ui/**'        # prebuild reads zine tokens from here
  #     - '.github/workflows/web-deploy.yml'
  workflow_dispatch:                  # allow manual "Run workflow"

concurrency:
  group: web-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build      # runs prebuild (zine tokens) + astro build

      - name: Deploy to Cloudflare Pages (avatok-app)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy dist --project-name=avatok-app --branch=main --commit-hash=${{ github.sha }}

      # Automatic deploy tracking: drop a PostHog annotation (commit SHA + message)
      # on the project timeline so every web deploy is visible against metrics and
      # errors. Best-effort — skips cleanly if POSTHOG_PERSONAL_API_KEY isn't set
      # and never fails the deploy. Needs repo secret POSTHOG_PERSONAL_API_KEY (phx_…).
      - name: PostHog deploy annotation
        if: success()
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_HOST: https://eu.posthog.com
          POSTHOG_PROJECT_ID: '139917'
          GIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$POSTHOG_KEY" ]; then echo "POSTHOG_PERSONAL_API_KEY unset — skipping annotation"; exit 0; fi
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SUBJECT=$(printf '%s' "${COMMIT_MSG:-manual deploy}" | head -n1)
          curl -sS -X POST "$POSTHOG_HOST/api/projects/$POSTHOG_PROJECT_ID/annotations/" \
            -H "Authorization: Bearer $POSTHOG_KEY" -H "Content-Type: application/json" \
            --data "$(jq -n --arg c "Web deploy ${GIT_SHA:0:7} — $SUBJECT" --arg d "$NOW" '{content:$c,date_marker:$d,scope:"project"}')" \
            -o /dev/null -w "PostHog annotation HTTP %{http_code}\n" || echo "annotation post failed (non-fatal)"
