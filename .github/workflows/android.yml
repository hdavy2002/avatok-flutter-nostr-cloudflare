name: Android build

# All app builds run on GitHub Actions — never on a local machine.
# Builds the app under app/ as a universal, side-loadable Android APK (.apk) —
# the ONLY artifact we ship — and publishes it to a Release tagged
# "calltest-latest" (prod) / "staging-latest" so there's a stable download
# link. No .aab or other formats are produced (owner decision 2026-07-04:
# "for all builds going forward I need an APK and not AAB").

# Staging lane (creator-marketplace Phase 1, A1): pushes to the `staging`
# branch build with --dart-define=AVATOK_ENV=staging (app talks to
# api-staging.avatok.ai) and publish under the staging-latest tag.
#
# AUTO-BUILD ON PUSH IS DISABLED (owner decision 2026-07-04: "no auto build
# unless I say so — just push to git and I'll trigger a build manually").
# Builds now run ONLY when the owner starts them by hand from the Actions tab
# (Run workflow) or `gh workflow run android.yml`. Agents may push commits
# freely; they must NEVER trigger this workflow without an explicit owner
# request. Re-enable the `push:` block below to resume auto-build on app/ changes.
on:
  # push:
  #   branches: [main, staging]
  #   paths:
  #     - 'app/**'
  #     - '.github/workflows/android.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which backend does this build talk to?'
        required: true
        default: staging
        type: choice
        options: [staging, prod]
      artifact:
        description: 'Artifact format (APK is the default — owner decision 2026-07-04)'
        required: true
        default: apk
        type: choice
        options: [apk, aab, both]

env:
  # [BUILD-WIDGET-1] The environment is now an explicit dispatch INPUT, not an
  # inference from the branch. The `|| (...)` keeps the old branch-derived value
  # as a fallback for the (currently disabled) push trigger, where inputs are ''.
  AVATOK_ENV: ${{ inputs.environment || (github.ref_name == 'staging' && 'staging' || 'prod') }}
  # APK is the DEFAULT (owner decision 2026-07-04: "for all builds going forward I
  # need an APK and not AAB"). 2026-07-09: the owner asked to be able to CHOOSE per
  # build, so `aab`/`both` are selectable — but nothing changes unless he picks them.
  # Empty inputs (push trigger) => apk only, exactly as before.
  BUILD_APK: ${{ (inputs.artifact == 'aab') && 'false' || 'true' }}
  BUILD_AAB: ${{ (inputs.artifact == 'aab' || inputs.artifact == 'both') && 'true' || 'false' }}

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    # [PROD-GATE-1] HARD approval gate. CLAUDE.md has said "NEVER trigger a build"
    # since before 2026-07-09, and on 2026-07-09 an agent ran `gh workflow run
    # android.yml` on `main` anyway (run 28988548192, event=workflow_dispatch) and
    # shipped a PRODUCTION build unasked. Written rules do not bind an AI.
    #
    # A `prod` build now targets the `production` GitHub Environment, which has the
    # owner as a REQUIRED REVIEWER. The run pauses at "Waiting for approval" and does
    # nothing until he clicks Approve in the Actions tab (and gets an email). No
    # token, agent, or API call can bypass an environment protection rule.
    #
    # `staging` has no reviewers — staging builds still run instantly, unattended.
    environment: ${{ (inputs.environment || (github.ref_name == 'staging' && 'staging' || 'prod')) == 'prod' && 'production' || 'staging' }}
    env:
      # [AAB-AUTO-1] Hoisted to JOB level so `if:` conditions can test it. Secrets
      # cannot be referenced directly in `if:`; an env var derived from one can.
      HAS_UPLOAD_KEYSTORE: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # [BUILD-WIDGET-1] Environment/branch guard. Picking "staging" in the widget
      # only sets --dart-define=AVATOK_ENV=staging; it does NOT change which code is
      # checked out. Dispatching "staging" from `main` would ship PROD code pointed
      # at the staging backend (and vice-versa: a "prod" build off `staging` would
      # ship untested code to live users). Fail loudly instead.
      #   prod    must be built from main
      #   staging must be built from staging
      - name: Guard — environment must match the branch
        run: |
          ENV="${AVATOK_ENV}"
          REF="${GITHUB_REF_NAME}"
          echo "environment=$ENV  branch=$REF  artifact=${{ inputs.artifact || 'apk' }}"
          if [ "$ENV" = "prod" ] && [ "$REF" != "main" ]; then
            echo "::error::PROD build requested from branch '$REF'. Production is built from 'main' only."
            exit 1
          fi
          if [ "$ENV" = "staging" ] && [ "$REF" != "staging" ]; then
            echo "::error::STAGING build requested from branch '$REF'. Re-run this workflow with the 'staging' branch selected."
            exit 1
          fi
          echo "OK: $ENV build from '$REF'."

      # [AAB-AUTO-1] An .aab MUST be signed with the Play upload key. Without the
      # keystore env vars, postcreate.py's injected signingConfig silently falls
      # back to the DEBUG key (app/tool/postcreate.py:482) — the build "succeeds"
      # and produces a bundle Play rejects at upload with "not signed with the
      # upload certificate." Fail here instead, with the fix in the error message.
      - name: Guard — AAB requires the Play upload keystore
        if: env.BUILD_AAB == 'true' && env.HAS_UPLOAD_KEYSTORE != 'true'
        run: |
          echo "::error::AAB requested but ANDROID_UPLOAD_KEYSTORE_BASE64 is not set on this repo."
          echo "Without it the .aab is signed with the DEBUG key and Play will reject it."
          echo ""
          echo "Fix (run once, from the repo root):"
          echo "  gh secret set ANDROID_UPLOAD_KEYSTORE_BASE64 < secrets/avatok-upload.jks.base64"
          echo "  gh secret set ANDROID_UPLOAD_STORE_PASSWORD"
          echo "  gh secret set ANDROID_UPLOAD_KEY_ALIAS"
          echo "  gh secret set ANDROID_UPLOAD_KEY_PASSWORD"
          exit 1

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin to the last stable BEFORE Flutter 3.44. 3.44 marked IconData
          # `final` (breaking-changes/icondata-class-marked-final), which breaks
          # phosphor_flutter 2.1.0 (it does `class PhosphorIconData extends
          # IconData`). 3.41.x ships Dart 3.9 (>= the repo's 3.7 floor) and keeps
          # the existing PhosphorIcons.name(PhosphorIconsStyle.x) API working.
          flutter-version: 3.41.x
          channel: stable
          cache: true

      - name: Generate android/ platform files
        working-directory: app
        run: flutter create --platforms=android --org ai.avatok --project-name avatok_call .

      - name: Configure Android (permissions, minSdk)
        working-directory: app
        run: python3 tool/postcreate.py

      # CI runner hardening: the GitHub-hosted runner (4 vCPU / 16 GB) was being
      # killed (SIGTERM / exit 143) mid-`assembleRelease` because the default
      # Gradle + Kotlin JVMs over-commit memory on this heavy app (WebRTC/LiveKit
      # native libs). Cap the heaps, kill the daemon + parallelism + VFS watch so
      # peak memory stays well under the runner limit. Last key wins in a
      # .properties file, so these override Flutter's generated defaults.
      - name: Harden Gradle for the CI runner (memory)
        working-directory: app
        run: |
          cat >> android/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.workers.max=2
          org.gradle.vfs.watch=false
          kotlin.daemon.jvmargs=-Xmx2g
          # R8 compat (non-full) mode: tolerate optional missing classes from
          # build-time-only deps (Stripe push-provisioning, AutoValue/javapoet,
          # javax.lang.model). Full mode treats them as hard errors; for a
          # side-load test APK we demote to warnings (paired with -dontwarn rules).
          android.enableR8.fullMode=false
          EOF
          echo "----- effective gradle.properties tail -----"
          tail -8 android/gradle.properties

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Generate code (drift / build_runner)
        working-directory: app
        # --delete-conflicting-outputs so a committed *.g.dart (e.g. db.g.dart) is
        # regenerated from source on a clean checkout instead of failing as a
        # "conflicting output" (matches the macOS workflow).
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (non-blocking)
        working-directory: app
        run: flutter analyze || true

      # Cloudflare-native pivot: the Nostr-era tests (nip44, relay diags) are
      # retired with the crypto/relay code. Run whatever tests remain; the
      # release .aab build below stays the real compile gate.
      - name: Test (compile gate)
        working-directory: app
        run: |
          if ls test/*_test.dart >/dev/null 2>&1; then flutter test; else echo "no tests — .aab build is the compile gate"; fi

      # Give every CI build a strictly-increasing versionCode derived from the
      # run number. The pubspec versionCode is pinned, so without this Play would
      # reject each upload as a duplicate; $((10000 + run_number)) guarantees each
      # new .aab is strictly newer. Signature stability is handled by
      # postcreate.py: it pins the committed keystore for the debug signingConfig
      # and points the release buildType at the upload keystore when the secret
      # env vars are set (falling back to the committed keystore otherwise).

      # Decode the Play upload keystore when the secret is configured. When it's
      # absent (e.g. before the secret is added) the release signingConfig in
      # postcreate.py falls back to the committed keystore, so the .aab still
      # builds — re-key with your real upload keystore before going live.
      # [AAB-AUTO-1] Was `if: env.ANDROID_UPLOAD_KEYSTORE_BASE64 != ''`, testing a var
      # defined only in THIS step's own `env:` block — whether that is in scope for
      # the step's own `if` is ambiguous in Actions. Use the job-level flag instead.
      - name: Decode upload keystore
        if: env.HAS_UPLOAD_KEYSTORE == 'true'
        id: keystore
        run: |
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/avatok-upload.jks"
          echo "path=$RUNNER_TEMP/avatok-upload.jks" >> $GITHUB_OUTPUT
          ls -la "$RUNNER_TEMP/avatok-upload.jks"
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}

      # [AAB-AUTO-1] Belt-and-braces: the decode step above is conditional, so if it
      # ever no-ops the keystore path is empty and Gradle would fall back to the
      # debug key. Assert the file really exists before we build a bundle.
      - name: Verify upload keystore decoded (AAB only)
        if: env.BUILD_AAB == 'true'
        run: |
          if [ ! -s "${{ steps.keystore.outputs.path }}" ]; then
            echo "::error::Upload keystore did not decode — refusing to build a debug-signed .aab."
            exit 1
          fi
          echo "Upload keystore present: ${{ steps.keystore.outputs.path }}"

      # Android App Bundle (.aab) — for the Play Store. Play splits per-ABI/density
      # server-side. Built only when the owner picks `aab` or `both`.
      - name: Build release App Bundle (.aab) for Play Store
        if: env.BUILD_AAB == 'true'
        working-directory: app
        run: flutter build appbundle --release --build-number=$((10000 + GITHUB_RUN_NUMBER)) --dart-define=AVATOK_ENV=$AVATOK_ENV --dart-define=GIT_SHA=${{ github.sha }}
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}

      - name: Stage .aab with a stable name
        if: env.BUILD_AAB == 'true'
        run: |
          mkdir -p dist
          ls -la app/build/app/outputs/bundle/release/
          cp app/build/app/outputs/bundle/release/app-release.aab dist/avatok-call.aab
          echo "size:"; ls -lh dist/

      - name: Upload .aab artifact (Play Store)
        if: env.BUILD_AAB == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: avatok-call-aab
          path: dist/avatok-call.aab

      # Side-loadable APK, SPLIT PER ABI. A universal (fat) APK bundles every
      # native lib and grows to ~220MB, which Android's installer rejects as
      # "package appears to be invalid." Splitting per ABI yields a lean ~80MB
      # arm64 APK that installs cleanly (the format that worked before).
      # arm64-ONLY (owner decision 2026-07-05: "I need arm64 apk and nothing else").
      # --target-platform android-arm64 restricts the split build to a single ABI, so
      # ONLY app-arm64-v8a-release.apk is produced (no armeabi-v7a, no x86). Faster too.
      - name: Build release APK (arm64 only, side-load)
        if: env.BUILD_APK == 'true'
        working-directory: app
        run: flutter build apk --release --split-per-abi --target-platform android-arm64 --build-number=$((10000 + GITHUB_RUN_NUMBER)) --dart-define=AVATOK_ENV=$AVATOK_ENV --dart-define=GIT_SHA=${{ github.sha }}
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}

      - name: Stage .apk with a stable name
        if: env.BUILD_APK == 'true'
        run: |
          mkdir -p dist
          ls -la app/build/app/outputs/flutter-apk/
          # arm64-v8a is the ONLY asset (owner 2026-07-05: arm64 and nothing else).
          cp app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/avatok-call-arm64.apk
          echo "size:"; ls -lh dist/

      - name: Upload .apk artifact (side-load)
        if: env.BUILD_APK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: avatok-call-apk
          path: dist/avatok-call-arm64.apk

      - name: Publish to Release (stable link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.AVATOK_ENV == 'staging' && 'staging-latest' || 'calltest-latest' }}
          name: ${{ env.AVATOK_ENV == 'staging' && 'AvaTok STAGING (latest)' || 'AvaTok Call Test (latest)' }}
          # [AAB-AUTO-1] BOTH artifacts are listed. `fail_on_unmatched_files: false`
          # means whichever one this run didn't build is simply skipped — so picking
          # `aab` in the widget now actually lands an .aab on the Release, which it
          # never did before (only the .apk was ever attached).
          files: |
            dist/avatok-call-arm64.apk
            dist/avatok-call.aab
          fail_on_unmatched_files: false
          body: |
            Built by CI from `app/` — environment: **${{ env.AVATOK_ENV }}**,
            format: **${{ inputs.artifact || 'apk' }}**.

            `avatok-call-arm64.apk` — side-loadable, arm64-v8a only. Install directly
            on the device (enable "Install unknown apps" for your browser / file
            manager if prompted). No Play Store step involved.

            `avatok-call.aab` — Play Store App Bundle, present only when this build
            requested `aab` or `both`. Always signed with the Play upload key; the
            build fails rather than emit a debug-signed bundle.

      # Automatic build tracking: drop a PostHog annotation (commit SHA + message)
      # on the project timeline for every APK/AAB build, matching the `release`
      # property the app now sends (--dart-define=GIT_SHA). Best-effort — skips if
      # POSTHOG_PERSONAL_API_KEY isn't set and never fails the build.
      - name: PostHog build annotation
        if: success()
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_HOST: https://eu.posthog.com
          POSTHOG_PROJECT_ID: '139917'
          GIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$POSTHOG_KEY" ]; then echo "POSTHOG_PERSONAL_API_KEY unset — skipping annotation"; exit 0; fi
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SUBJECT=$(printf '%s' "${COMMIT_MSG:-manual build}" | head -n1)
          curl -sS -X POST "$POSTHOG_HOST/api/projects/$POSTHOG_PROJECT_ID/annotations/" \
            -H "Authorization: Bearer $POSTHOG_KEY" -H "Content-Type: application/json" \
            --data "$(jq -n --arg c "Android $AVATOK_ENV build ${GIT_SHA:0:7} — $SUBJECT" --arg d "$NOW" '{content:$c,date_marker:$d,scope:"project"}')" \
            -o /dev/null -w "PostHog annotation HTTP %{http_code}\n" || echo "annotation post failed (non-fatal)"
