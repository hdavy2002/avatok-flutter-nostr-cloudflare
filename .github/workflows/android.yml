name: Android build

# All app builds run on GitHub Actions — never on a local machine.
# Builds the calling test app under app/, then publishes the APK to a
# Release tagged "calltest-latest" so there's a stable direct download link.

# Staging lane (creator-marketplace Phase 1, A1): pushes to the `staging`
# branch build with --dart-define=AVATOK_ENV=staging (app talks to
# api-staging.avatok.ai) and publish under the staging-latest tag.
on:
  push:
    branches: [main, staging]
    paths:
      - 'app/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

env:
  AVATOK_ENV: ${{ github.ref_name == 'staging' && 'staging' || 'prod' }}

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin to the last stable BEFORE Flutter 3.44. 3.44 marked IconData
          # `final` (breaking-changes/icondata-class-marked-final), which breaks
          # phosphor_flutter 2.1.0 (it does `class PhosphorIconData extends
          # IconData`). 3.41.x ships Dart 3.9 (>= the repo's 3.7 floor) and keeps
          # the existing PhosphorIcons.name(PhosphorIconsStyle.x) API working.
          flutter-version: 3.41.x
          channel: stable
          cache: true

      - name: Generate android/ platform files
        working-directory: app
        run: flutter create --platforms=android --org ai.avatok --project-name avatok_call .

      - name: Configure Android (permissions, minSdk)
        working-directory: app
        run: python3 tool/postcreate.py

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Generate code (drift / build_runner)
        working-directory: app
        run: dart run build_runner build

      - name: Analyze (non-blocking)
        working-directory: app
        run: flutter analyze || true

      # Cloudflare-native pivot: the Nostr-era tests (nip44, relay diags) are
      # retired with the crypto/relay code. Run whatever tests remain; the
      # release APK build below stays the real compile gate.
      - name: Test (compile gate)
        working-directory: app
        run: |
          if ls test/*_test.dart >/dev/null 2>&1; then flutter test; else echo "no tests — APK build is the compile gate"; fi

      # Sign every debug build with the SAME committed debug keystore so a new
      # APK installs over an existing one (Android refuses updates when the
      # signing certificate changes). Without this, `flutter create` lets AGP
      # auto-generate a fresh, random debug keystore on each CI run, so every
      # build had a different signature and required uninstalling first.
      - name: Pin stable debug keystore
        run: |
          mkdir -p ~/.android
          base64 -d app/android-keystore/debug.keystore.base64 > ~/.android/debug.keystore
          keytool -list -keystore ~/.android/debug.keystore -storepass android | grep -i sha || true

      # Give every CI build a strictly-increasing versionCode. The pubspec is
      # pinned at +18, so without this every APK shipped versionCode 18 and
      # Android rejected the update ("conflicts with existing package" / "app not
      # installed") because it looked like the same version. Deriving the build
      # number from the run number guarantees each new APK is strictly newer, so
      # it installs over the top — no uninstall needed. (Signature already stable
      # via the pinned debug keystore above; both are required for clean updates.)
      # RELEASE + split-per-ABI: the debug APK bundled all 4 CPU architectures +
      # the JIT engine + no shrinking → ~200 MB. Release is AOT + R8 shrunk, and
      # split-per-ABI ships ONE architecture per file, so the arm64 APK (every
      # phone from the last ~7 years, incl. the test devices) is ~30–50 MB.
      # Release is signed with the SAME committed keystore as debug (postcreate
      # points signingConfigs.debug at it and the release buildType reuses it),
      # so this installs straight over the existing build — no uninstall.
      - name: Build release APK (split per ABI)
        working-directory: app
        run: flutter build apk --release --split-per-abi --build-number=$((10000 + GITHUB_RUN_NUMBER)) --dart-define=AVATOK_ENV=$AVATOK_ENV
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      # Safety net: also build the debug APK as a fallback, in case the release
      # build misbehaves on a device (release is AOT + can differ from debug).
      # The small release arm64 is the primary download; debug is the backup.
      - name: Build debug APK (fallback)
        working-directory: app
        run: flutter build apk --debug --build-number=$((10000 + GITHUB_RUN_NUMBER)) --dart-define=AVATOK_ENV=$AVATOK_ENV
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}

      # Play Store .aab build (prod track only). Gated on the upload keystore
      # secret being set so PRs/forks/staging don't fail when it's missing. The
      # release signingConfig in postcreate.py reads these env vars; when
      # ANDROID_UPLOAD_KEYSTORE_PATH is empty the release buildType falls back to
      # the debug keystore (used by the APK builds above), so adding this step
      # does NOT change those.
      - name: Decode upload keystore
        if: env.AVATOK_ENV == 'prod' && env.ANDROID_UPLOAD_KEYSTORE_BASE64 != ''
        id: keystore
        run: |
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/avatok-upload.jks"
          echo "path=$RUNNER_TEMP/avatok-upload.jks" >> $GITHUB_OUTPUT
          ls -la "$RUNNER_TEMP/avatok-upload.jks"
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}

      - name: Build release App Bundle (.aab) for Play Store
        if: steps.keystore.outputs.path != ''
        working-directory: app
        run: flutter build appbundle --release --build-number=$((10000 + GITHUB_RUN_NUMBER)) --dart-define=AVATOK_ENV=$AVATOK_ENV
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}

      - name: Stage APKs with stable names
        run: |
          mkdir -p dist
          ls -la app/build/app/outputs/flutter-apk/
          cp app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/avatok-call.apk
          cp app/build/app/outputs/flutter-apk/app-debug.apk dist/avatok-call-debug.apk
          if [ -f app/build/app/outputs/bundle/release/app-release.aab ]; then
            cp app/build/app/outputs/bundle/release/app-release.aab dist/avatok-call.aab
          fi
          echo "sizes:"; ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avatok-call-apk
          path: dist/avatok-call.apk

      - name: Upload .aab artifact (Play Store)
        if: steps.keystore.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: avatok-call-aab
          path: dist/avatok-call.aab

      - name: Publish to Release (stable link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.AVATOK_ENV == 'staging' && 'staging-latest' || 'calltest-latest' }}
          name: ${{ env.AVATOK_ENV == 'staging' && 'AvaTok STAGING (latest)' || 'AvaTok Call Test (latest)' }}
          files: |
            dist/avatok-call.apk
            dist/avatok-call-debug.apk
            dist/avatok-call.aab
          fail_on_unmatched_files: false
          body: |
            Debug APK for on-device call testing. Built by CI from `app/`.
            Install on Android (allow "install from unknown sources"), open it,
            enter a room code, and join the same room on a second device or the
            browser test page at the signaling URL.

            Play Store builds: `avatok-call.aab` (present only on prod when the
            upload keystore secret is configured). Upload it to Play Console →
            Internal testing → Create new release.
