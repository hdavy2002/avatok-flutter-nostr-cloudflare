name: Android build

# All app builds run on GitHub Actions — never on a local machine.
# Builds the calling test app under app/, then publishes the APK to a
# Release tagged "calltest-latest" so there's a stable direct download link.

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate android/ platform files
        working-directory: app
        run: flutter create --platforms=android --org ai.avatok --project-name avatok_call .

      - name: Configure Android (permissions, minSdk)
        working-directory: app
        run: python3 tool/postcreate.py

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Fix clerk_flutter localizations (missing generated files)
        run: |
          CLERK_DIR=$(find ~/.pub-cache/hosted/pub.dev -maxdepth 1 -type d -name "clerk_flutter-*" | head -1)
          echo "clerk dir: $CLERK_DIR"
          [ -z "$CLERK_DIR" ] && exit 0
          echo "=== l10n.yaml ==="; cat "$CLERK_DIR/l10n.yaml" 2>/dev/null || echo "(none)"
          echo "=== arb files ==="; find "$CLERK_DIR" -name "*.arb" | head
          # Strip the deprecated synthetic-package directive that breaks newer gen-l10n
          [ -f "$CLERK_DIR/l10n.yaml" ] && sed -i '/synthetic-package/d' "$CLERK_DIR/l10n.yaml"
          echo "=== run gen-l10n ==="
          (cd "$CLERK_DIR" && flutter gen-l10n) || echo "GEN-L10N FAILED ^^^"
          echo "=== generated dir ==="; ls -la "$CLERK_DIR/lib/generated" 2>/dev/null || echo "no generated dir"

      - name: Analyze (non-blocking)
        working-directory: app
        run: flutter analyze || true

      - name: Build debug APK
        working-directory: app
        # --no-pub: do NOT run pub get here, or it restores clerk_flutter to
        # pristine and deletes the localizations we generated above.
        run: flutter build apk --debug --no-pub

      - name: Stage APK with stable name
        run: |
          mkdir -p dist
          cp app/build/app/outputs/flutter-apk/app-debug.apk dist/avatok-call.apk
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avatok-call-apk
          path: dist/avatok-call.apk

      - name: Publish to Release (stable link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: calltest-latest
          name: AvaTok Call Test (latest)
          body: |
            Debug APK for on-device call testing. Built by CI from `app/`.
            Install on Android (allow "install from unknown sources"), open it,
            enter a room code, and join the same room on a second device or the
            browser test page at the signaling URL.
          files: dist/avatok-call.apk
