name: Android build

# All app builds run on GitHub Actions — never on a local machine.
# Builds the app under app/ as a Play Store Android App Bundle (.aab) — the
# ONLY artifact we ship — and publishes it to a Release tagged
# "calltest-latest" (prod) / "staging-latest" so there's a stable download
# link. No APK or other formats are produced.

# Staging lane (creator-marketplace Phase 1, A1): pushes to the `staging`
# branch build with --dart-define=AVATOK_ENV=staging (app talks to
# api-staging.avatok.ai) and publish under the staging-latest tag.
#
# AUTO-BUILD ON PUSH IS DISABLED (owner decision 2026-07-04: "no auto build
# unless I say so — just push to git and I'll trigger a build manually").
# Builds now run ONLY when the owner starts them by hand from the Actions tab
# (Run workflow) or `gh workflow run android.yml`. Agents may push commits
# freely; they must NEVER trigger this workflow without an explicit owner
# request. Re-enable the `push:` block below to resume auto-build on app/ changes.
on:
  # push:
  #   branches: [main, staging]
  #   paths:
  #     - 'app/**'
  #     - '.github/workflows/android.yml'
  workflow_dispatch:

env:
  AVATOK_ENV: ${{ github.ref_name == 'staging' && 'staging' || 'prod' }}
  # AAB-only for the Play Store (owner 2026-07-04: "from now on we make the .aab
  # file and no apk file"). This SUPERSEDES the 2026-06-24 "just apk, no aab"
  # decision. Normally the .aab is the ONLY artifact this workflow builds.
  # One-off override (owner 2026-07-04, later same day): "i just need a apk
  # file and not aab etc" for this run — AAB build skipped this time.
  BUILD_AAB: 'false'
  # One-off APK build (owner 2026-07-04: apk-only this run per the override above).
  BUILD_APK: 'true'

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pin to the last stable BEFORE Flutter 3.44. 3.44 marked IconData
          # `final` (breaking-changes/icondata-class-marked-final), which breaks
          # phosphor_flutter 2.1.0 (it does `class PhosphorIconData extends
          # IconData`). 3.41.x ships Dart 3.9 (>= the repo's 3.7 floor) and keeps
          # the existing PhosphorIcons.name(PhosphorIconsStyle.x) API working.
          flutter-version: 3.41.x
          channel: stable
          cache: true

      - name: Generate android/ platform files
        working-directory: app
        run: flutter create --platforms=android --org ai.avatok --project-name avatok_call .

      - name: Configure Android (permissions, minSdk)
        working-directory: app
        run: python3 tool/postcreate.py

      # CI runner hardening: the GitHub-hosted runner (4 vCPU / 16 GB) was being
      # killed (SIGTERM / exit 143) mid-`assembleRelease` because the default
      # Gradle + Kotlin JVMs over-commit memory on this heavy app (WebRTC/LiveKit
      # native libs). Cap the heaps, kill the daemon + parallelism + VFS watch so
      # peak memory stays well under the runner limit. Last key wins in a
      # .properties file, so these override Flutter's generated defaults.
      - name: Harden Gradle for the CI runner (memory)
        working-directory: app
        run: |
          cat >> android/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError
          org.gradle.daemon=false
          org.gradle.parallel=false
          org.gradle.workers.max=2
          org.gradle.vfs.watch=false
          kotlin.daemon.jvmargs=-Xmx2g
          # R8 compat (non-full) mode: tolerate optional missing classes from
          # build-time-only deps (Stripe push-provisioning, AutoValue/javapoet,
          # javax.lang.model). Full mode treats them as hard errors; for a
          # side-load test APK we demote to warnings (paired with -dontwarn rules).
          android.enableR8.fullMode=false
          EOF
          echo "----- effective gradle.properties tail -----"
          tail -8 android/gradle.properties

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Generate code (drift / build_runner)
        working-directory: app
        # --delete-conflicting-outputs so a committed *.g.dart (e.g. db.g.dart) is
        # regenerated from source on a clean checkout instead of failing as a
        # "conflicting output" (matches the macOS workflow).
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze (non-blocking)
        working-directory: app
        run: flutter analyze || true

      # Cloudflare-native pivot: the Nostr-era tests (nip44, relay diags) are
      # retired with the crypto/relay code. Run whatever tests remain; the
      # release .aab build below stays the real compile gate.
      - name: Test (compile gate)
        working-directory: app
        run: |
          if ls test/*_test.dart >/dev/null 2>&1; then flutter test; else echo "no tests — .aab build is the compile gate"; fi

      # Give every CI build a strictly-increasing versionCode derived from the
      # run number. The pubspec versionCode is pinned, so without this Play would
      # reject each upload as a duplicate; $((10000 + run_number)) guarantees each
      # new .aab is strictly newer. Signature stability is handled by
      # postcreate.py: it pins the committed keystore for the debug signingConfig
      # and points the release buildType at the upload keystore when the secret
      # env vars are set (falling back to the committed keystore otherwise).

      # Decode the Play upload keystore when the secret is configured. When it's
      # absent (e.g. before the secret is added) the release signingConfig in
      # postcreate.py falls back to the committed keystore, so the .aab still
      # builds — re-key with your real upload keystore before going live.
      - name: Decode upload keystore
        if: env.ANDROID_UPLOAD_KEYSTORE_BASE64 != ''
        id: keystore
        run: |
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/avatok-upload.jks"
          echo "path=$RUNNER_TEMP/avatok-upload.jks" >> $GITHUB_OUTPUT
          ls -la "$RUNNER_TEMP/avatok-upload.jks"
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}

      # Android App Bundle (.aab) — the ONLY artifact we ship. Upload to Play
      # Console. Play splits per-ABI/density server-side, so no APK is needed.
      - name: Build release App Bundle (.aab) for Play Store
        if: env.BUILD_AAB == 'true'
        working-directory: app
        run: flutter build appbundle --release --build-number=$((10000 + GITHUB_RUN_NUMBER)) --dart-define=AVATOK_ENV=$AVATOK_ENV --dart-define=GIT_SHA=${{ github.sha }}
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}

      - name: Stage .aab with a stable name
        if: env.BUILD_AAB == 'true'
        run: |
          mkdir -p dist
          ls -la app/build/app/outputs/bundle/release/
          cp app/build/app/outputs/bundle/release/app-release.aab dist/avatok-call.aab
          echo "size:"; ls -lh dist/

      - name: Upload .aab artifact (Play Store)
        if: env.BUILD_AAB == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: avatok-call-aab
          path: dist/avatok-call.aab

      # Universal side-loadable APK — one-off this run (BUILD_APK). The .aab above
      # stays the Play Store artifact; this .apk is for direct install / testing.
      - name: Build release APK (universal, side-load)
        if: env.BUILD_APK == 'true'
        working-directory: app
        run: flutter build apk --release --build-number=$((10000 + GITHUB_RUN_NUMBER)) --dart-define=AVATOK_ENV=$AVATOK_ENV --dart-define=GIT_SHA=${{ github.sha }}
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}

      - name: Stage .apk with a stable name
        if: env.BUILD_APK == 'true'
        run: |
          mkdir -p dist
          ls -la app/build/app/outputs/flutter-apk/
          cp app/build/app/outputs/flutter-apk/app-release.apk dist/avatok-call.apk
          echo "size:"; ls -lh dist/

      - name: Upload .apk artifact (side-load)
        if: env.BUILD_APK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: avatok-call-apk
          path: dist/avatok-call.apk

      - name: Publish to Release (stable link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.AVATOK_ENV == 'staging' && 'staging-latest' || 'calltest-latest' }}
          name: ${{ env.AVATOK_ENV == 'staging' && 'AvaTok STAGING (latest)' || 'AvaTok Call Test (latest)' }}
          files: |
            dist/avatok-call.aab
            dist/avatok-call.apk
          fail_on_unmatched_files: false
          body: |
            Play Store Android App Bundle (.aab), built by CI from `app/` — the
            ONLY artifact we ship (owner 2026-07-04: .aab only, no APK).
            Download `avatok-call.aab` and upload it in Play Console → pick a
            track (Internal testing / Production) → Create new release. Play
            generates the per-device APKs from the bundle server-side.

            Signed with the Play upload key when the ANDROID_UPLOAD_KEYSTORE_BASE64
            (+ store/alias/key password) secrets are set; otherwise signed with
            the committed fallback keystore so the build still succeeds.

      # Automatic build tracking: drop a PostHog annotation (commit SHA + message)
      # on the project timeline for every APK/AAB build, matching the `release`
      # property the app now sends (--dart-define=GIT_SHA). Best-effort — skips if
      # POSTHOG_PERSONAL_API_KEY isn't set and never fails the build.
      - name: PostHog build annotation
        if: success()
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_HOST: https://eu.posthog.com
          POSTHOG_PROJECT_ID: '139917'
          GIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ -z "$POSTHOG_KEY" ]; then echo "POSTHOG_PERSONAL_API_KEY unset — skipping annotation"; exit 0; fi
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SUBJECT=$(printf '%s' "${COMMIT_MSG:-manual build}" | head -n1)
          curl -sS -X POST "$POSTHOG_HOST/api/projects/$POSTHOG_PROJECT_ID/annotations/" \
            -H "Authorization: Bearer $POSTHOG_KEY" -H "Content-Type: application/json" \
            --data "$(jq -n --arg c "Android $AVATOK_ENV build ${GIT_SHA:0:7} — $SUBJECT" --arg d "$NOW" '{content:$c,date_marker:$d,scope:"project"}')" \
            -o /dev/null -w "PostHog annotation HTTP %{http_code}\n" || echo "annotation post failed (non-fatal)"
