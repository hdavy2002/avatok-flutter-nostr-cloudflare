name: avatok_call
description: AvaTok calling test shell (P2P WebRTC over Cloudflare signaling).
publish_to: 'none'
version: 0.1.17+18

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  ava_diagnostics:
    path: ../ava_diagnostics
  flutter_chat_ui: ^1.6.15
  flutter_chat_types: ^3.6.2
  flutter:
    sdk: flutter
  flutter_webrtc: ^0.12.5
  # AvaTalk group conferencing (Phase 10 — LiveKit, ≤25 participants). Rides on
  # the SAME flutter_webrtc/libwebrtc above — no second WebRTC stack in the APK.
  livekit_client: ^2.3.0
  # Wi-Fi ⇆ cellular handoff detection → proactive ICE restart mid-call.
  connectivity_plus: ^6.1.0
  web_socket_channel: ^3.0.1
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  # AvaTOK design system iconography — Phosphor (bold/fill variants only, §6).
  phosphor_flutter: ^2.1.0
  bip340: ^0.3.1
  flutter_secure_storage: ^9.2.2
  http: ^1.2.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  # Phone (SMS) OTP verification at onboarding.
  firebase_auth: ^5.3.1
  flutter_local_notifications: ^17.2.3
  # App-icon unread badge (red dot + count, WhatsApp-style). Android support is
  # launcher-dependent: Pixel shows a dot (count on long-press), Samsung/Oppo/
  # Xiaomi/etc. show the number. iOS/macOS always show the number.
  app_badge_plus: ^1.2.9
  # Product analytics + error tracking → PostHog (EU). See lib/core/analytics.dart.
  posthog_flutter: ^4.10.0
  # Encrypted chat media (pure-Dart AES-GCM) + pickers/record/playback
  cryptography: ^2.7.0
  image_picker: ^1.1.2
  # L2 liveness selfie-clip capture (Trust Ladder — challenge frames + clip)
  camera: ^0.11.0+2
  file_picker: ^8.1.6
  audioplayers: ^6.1.0
  record: ^7.0.0
  # Live voice translation — raw 24 kHz PCM playback of Gemini Live Translate
  # output (lib/features/translation/translation_engine.dart).
  flutter_pcm_sound: ^3.0.0
  path_provider: ^2.1.4
  video_player: ^2.9.2
  # NIP-44 v2 crypto (secp256k1 ECDH, ChaCha20, HMAC, HKDF) — pure Dart
  # ^4.0.0 to match bip340's transitive constraint.
  pointycastle: ^4.0.0
  # Safety-number / contact QR code
  qr_flutter: ^4.1.0
  # Location share + open-in-maps
  geolocator: ^13.0.1
  url_launcher: ^6.3.0
  # Native incoming-call UI (full-screen, lock-screen) + ConnectionService
  # Pinned to 2.x — 3.x rewrote the CallEvent/params API.
  flutter_callkit_incoming: ^2.5.8
  # Read the device address book (name / emails / phones) to find & invite friends.
  flutter_contacts: ^1.1.9+2
  # Native share sheet for the "invite a friend" message + download link.
  share_plus: ^10.1.2
  # Local-first SQLite database (the WhatsApp model): on-device source of truth
  # for chats/messages/contacts with reactive queries (the UI watches the DB, so
  # navigation/cold-start read locally — instant — and the network only syncs new
  # rows in). sqlite3_flutter_libs bundles SQLite so FTS5 (+ future vector) work
  # the same on every device; with split-per-ABI it adds ~1.5MB.
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.18
  # Phase 4 (Two-Lane Memory) — on-device vector + embedder deps DEFERRED here by
  # Phase 0. DECISION: NO new packages are needed for the free on-device lane.
  #   • FTS5 keyword search → already available (sqlite3_flutter_libs bundles
  #     SQLite with FTS5; the ava_fts virtual table is created via raw SQL on the
  #     existing drift connection — see core/ava_memory/local_index.dart).
  #   • Vector search → 256-D embeddings stored as BLOB rows in the SAME per-
  #     account sqlite file and ranked by BRUTE-FORCE COSINE in pure Dart. At
  #     on-device message volumes this needs no native vector engine (no
  #     sqlite-vec / ObjectBox / ZVEC), so none is added.
  #   • Embedder runtime → on-device model INFERENCE is stubbed (deterministic
  #     256-D hashing embedder) because wiring a native ML runtime (LiteRT/ONNX)
  #     can't be compiled/verified headless and pinning an un-buildable native ML
  #     dep would risk the APK build. The interface + download-on-first-use
  #     scaffolding ship now; adding the runtime later is a one-class change with
  #     NO pubspec churn beyond that single runtime package. See INTEGRATION-NOTES.

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  # drift code generation (run via build_runner; CI regenerates on every build).
  drift_dev: ^2.16.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    - assets/models/   # AvaVision on-device vision models (MoveNet/MediaPipe Tasks)
  # AvaTOK design system fonts (bundled — offline-safe; see AVATOK-DESIGN-SYSTEM):
  # Fredoka = display/headings/buttons · Nunito = body (>=600) · Space Mono = labels/kickers.
  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Medium.ttf
          weight: 500
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Fredoka-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900
    - family: Space Mono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700

dependency_overrides:
  record: 6.2.1
