name: avatok_call
description: AvaTok calling test shell (P2P WebRTC over Cloudflare signaling).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^0.12.5
  web_socket_channel: ^3.0.1
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  bip340: ^0.3.1
  flutter_secure_storage: ^9.2.2
  http: ^1.2.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  # Encrypted chat media (pure-Dart AES-GCM) + pickers/playback
  cryptography: ^2.7.0
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
