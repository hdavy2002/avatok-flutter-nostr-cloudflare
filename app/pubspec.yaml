name: avatok_call
description: AvaTok calling test shell (P2P WebRTC over Cloudflare signaling).
publish_to: 'none'
version: 0.1.18+28

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  ava_diagnostics:
    path: ../ava_diagnostics
  flutter_chat_ui: ^1.6.15
  flutter_chat_types: ^3.6.2
  flutter:
    sdk: flutter
  flutter_webrtc: ^0.12.5
  # AvaTalk group conferencing (Phase 10 — LiveKit, ≤25 participants). Rides on
  # the SAME flutter_webrtc/libwebrtc above — no second WebRTC stack in the APK.
  livekit_client: ^2.3.0
  # Wi-Fi ⇆ cellular handoff detection → proactive ICE restart mid-call.
  connectivity_plus: ^6.1.0
  # Keep the screen/CPU awake for the duration of a call so the OS can't put the
  # device to sleep and suspend the call isolate mid-conversation (the dropped-
  # after-~1-min / "screen took over and the call cut" bug — WhatsApp keeps the
  # call screen alive the same way). Enabled on the CallScreen, released on every
  # teardown path. NATIVE plugin — must be validated by a CI APK build.
  wakelock_plus: ^1.2.8
  web_socket_channel: ^3.0.1
  # Bumped 11.3.1 → 12.0.1: the `cactus` on-device-AI plugin requires
  # permission_handler ^12.0.1. The APIs this app uses (Permission.microphone/
  # camera/contacts/notification, .request(), .isGranted, .denied/.deniedForever)
  # are unchanged in 12.x. Must be validated by a CI APK build.
  permission_handler: ^12.0.1
  uuid: ^4.5.1
  # AvaTOK design system iconography — Phosphor (bold/fill variants only, §6).
  phosphor_flutter: ^2.1.0
  # Render Composio's colorful brand logos (served as SVG) in the Connectors grid.
  flutter_svg: ^2.0.16
  # SHA-256 (account-vault key derivation, identity/presence room ids). Kept as a
  # DIRECT dependency now that pointycastle/bip340 (which pulled it transitively)
  # are removed. Byte-for-byte identical to the previous SHA256Digest output.
  crypto: ^3.0.3
  flutter_secure_storage: ^9.2.2
  http: ^1.2.0
  # firebase_core + firebase_messaging are FCM PUSH ONLY. Keep them.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  # [AVA-IDGATE-1] firebase_auth REMOVED 2026-07-10. It existed solely for phone
  # SMS OTP, which is gone app-wide — a phone number proved nothing about identity
  # and every SMS cost money. Identity is now a Didit liveness check at the first
  # public action. See Specs/SPEC-2026-07-10-identity-gating.md
  flutter_local_notifications: ^17.2.3
  # App-icon unread badge (red dot + count, WhatsApp-style). Android support is
  # launcher-dependent: Pixel shows a dot (count on long-press), Samsung/Oppo/
  # Xiaomi/etc. show the number. iOS/macOS always show the number.
  app_badge_plus: ^1.2.9
  # Read the REAL installed app version + build number (versionName/versionCode)
  # at runtime so the About screen reflects what CI actually shipped. CI injects
  # a strictly-increasing versionCode via `flutter build --build-number` (see
  # .github/workflows/android.yml), which the old hardcoded kAppBuild constant
  # never reflected — the build number looked frozen after every update.
  package_info_plus: ^8.0.2
  # Google Play in-app updates (Android). Powers the "Update" sidebar row + the
  # on-launch "new version available" popup: checks Play for a newer versionCode
  # and runs the flexible download/restart flow WITHOUT sending the user to the
  # Store. Android-only (no-ops on iOS); wraps Play Core → NATIVE plugin, must be
  # validated by a CI build. Gated by RemoteConfig.inAppUpdateEnabled. See
  # core/update_service.dart.
  in_app_update: ^4.2.3
  # Product analytics + error tracking → PostHog (EU). See lib/core/analytics.dart.
  posthog_flutter: ^5.30.0
  # Native in-app Stripe PaymentSheet for wallet top-ups (card / Apple Pay /
  # Google Pay) — keeps checkout inside the app, no browser redirect.
  flutter_stripe: ^11.1.0
  # Encrypted chat media (pure-Dart AES-GCM) + pickers/record/playback
  cryptography: ^2.7.0
  image_picker: ^1.1.2
  # Client-side video transcode (720p H.264) before a chat video is uploaded, so
  # multi-hundred-MB source clips shrink to the 64 MB policy cap. Native
  # (MediaCodec / AVFoundation) — no app-bundled encoder. See VIDPOL-1.
  video_compress: ^3.1.4
  # Native on-device speech-to-text (phone's built-in recognizer) for instant
  # voice-to-text — no app-bundled model, no download, OS loads/unloads it. Cloud
  # Whisper stays as the fallback for devices without on-device recognition.
  speech_to_text: ^7.3.0
  # On-device, offline TEXT translation for the composer Translate tool (pic4):
  # ~tens of ms vs a multi-second Gemini round-trip. Language models download on
  # demand (deferred — never at install), with the Gemini path as fallback.
  google_mlkit_translation: ^0.13.0
  google_mlkit_language_id: ^0.13.0
  # L2 liveness selfie-clip capture (Trust Ladder — challenge frames + clip)
  camera: ^0.11.0+2
  # Liveness V2 (Specs/LIVENESS-V2-PLAN.md §3) — on-device, offline, free face
  # detection powering the real-time pre-capture quality gates (face present /
  # lit / centered / eyes open / one person / no mask) + head-Euler UX. Gated
  # behind RemoteConfig.livenessV2Enabled; V1 flow keeps working when off.
  google_mlkit_face_detection: ^0.13.1
  # Liveness V2 flash-fill (plan §4 step 1 / A8-A9 mitigation): boost screen
  # brightness to 100% + white surround as a ring-light while capturing, then
  # ALWAYS restore the previous brightness on dispose.
  screen_brightness: ^2.1.0
  # Liveness V3 active anti-avatar checks (Specs/LIVENESS-V3-VOICE-GUIDED-PLAN):
  # accelerometer (+ gyroscope) capture during the face stage → the `capture_meta`
  # sensor_timeline the server correlates against the scheduled haptic buzz (a
  # rigid tripod / emulator has no hand micro-tremor + no buzz spike). NATIVE
  # plugin (android.hardware.Sensor / CoreMotion) — validated by a CI APK build;
  # a missing sensor leaves the timeline empty and the flow proceeds.
  sensors_plus: ^6.1.0
  # Liveness V3 camera-path integrity probe: emulator detection (isPhysicalDevice)
  # + Android build-tags root heuristic for the `capture_meta.integrity` block.
  # NATIVE plugin — validated by a CI APK build; unknowable fields stay null.
  device_info_plus: ^10.1.2
  file_picker: ^8.1.6
  audioplayers: ^6.1.0
  # Liveness V3 voice fallback (Specs/LIVENESS-V3-VOICE-GUIDED-PLAN-DRAFT.md §1):
  # when a language's pre-recorded Ava clip is missing (download failed / not yet
  # cached), speak the localized instruction via the device's built-in TTS engine
  # so the flow is NEVER blocked on a voice pack. NATIVE plugin (AVSpeechSynthesizer
  # / android.speech.tts) — must be validated by a CI APK build; the app degrades
  # gracefully (English clips + on-screen text) if TTS init fails on a device.
  flutter_tts: ^4.2.0
  record: ^7.0.0
  # Live voice translation — raw 24 kHz PCM playback of Gemini Live Translate
  # output (lib/features/translation/translation_engine.dart).
  flutter_pcm_sound: ^3.0.0
  path_provider: ^2.1.4
  video_player: ^2.9.2
  # AvaLibrary universal thumbnails — render a video's first frame and a PDF's
  # first page to a cached image (features/library/lib_thumbs.dart). NATIVE
  # plugins: must be validated by a CI APK build (this repo can't compile headless).
  # Runtime is wrapped so a render failure falls back to a type tile, never blank.
  video_thumbnail: ^0.5.3
  pdfx: ^2.6.0
  # Inline YouTube playback inside chat preview cards (features/avatok/
  # chat_media_cards.dart → YouTubeCard). Pure-Dart wrapper over an embedded
  # webview; NATIVE — must be validated by a CI APK build (can't compile headless).
  youtube_player_iframe: ^5.2.0
  # GIPHY rich picker (STREAM E — Tenor→GIPHY migration). Official GIPHY Flutter
  # SDK: GIFs, Stickers, GIPHY Text (dynamic), Emoji, and Clips (GIF+sound). Wraps
  # the native iOS/Android GIPHY SDKs → NATIVE plugin, must be validated by a CI
  # APK build. Requires Android minSdk >= 21 (this app is 24 ✓) and the host
  # MainActivity to be a FlutterFragmentActivity (already the case for
  # flutter_stripe). iOS requires iOS 13+. Configured with the CLIENT SDK key in
  # features/messaging/widgets/giphy_config.dart.
  giphy_flutter_sdk: ^1.1.2
  # Contact QR code (profile share)
  qr_flutter: ^4.1.0
  # Compose the shareable/downloadable QR card image (JPEG) — branded card with
  # title + QR + AvaTOK number, generated programmatically (owner request 2026-06-29).
  image: ^4.2.0
  # Print the QR card (post it at a business) — wraps the generated card in a PDF.
  printing: ^5.13.4
  # PDF document model used to lay out the QR card (shared by print + JPEG raster).
  pdf: ^3.11.1
  # QR/barcode generator used by pdf's BarcodeWidget (Barcode.qrCode()).
  barcode: ^2.2.9
  # Incoming deep links — avatok://add?t= and https://avatok.ai/add?t= open the
  # app straight to the "add contact" card (Specs/AVATOK-NUMBER-FEATURE-SPEC.md).
  app_links: ^6.3.2
  # Location share + open-in-maps
  geolocator: ^13.0.1
  url_launcher: ^6.3.0
  # [LIVE-DIDIT-1] In-app Didit liveness (owner decision 2026-07-10: the check
  # must FEEL native — no external browser, no visible third-party hop). Didit's
  # documented Flutter WebView integration; NATIVE plugins — validated by the CI
  # APK build (can't compile headless).
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.0
  webview_flutter_wkwebview: ^3.16.0
  # Native Google Play Billing (Android in-app subscriptions). Wraps
  # com.android.billingclient; the client buys avatok_*_monthly then the Worker
  # verifies the token server-side (core/play_billing.dart → /subscribe/android/verify).
  in_app_purchase: ^3.2.0
  # In-app OAuth sheet (iOS ASWebAuthenticationSession / Android Custom Tabs)
  # that AUTO-CLOSES the moment Google redirects to our avatokauth:// callback —
  # used by the AvaStorage "Connect Google Drive" flow so the user authorizes
  # Google and lands right back in the app, never bounced to the external Chrome
  # app. A raw WebView is NOT used (Google blocks OAuth in embedded webviews).
  # NATIVE plugin — must be validated by a CI APK build (can't compile headless).
  # Pinned to 5.x: 3.1.2's Android code referenced the removed Flutter v1-embedding
  # `Registrar` and failed to compile under Flutter 3.41 (CI). v4 dropped v1
  # embedding; v5 is hardened for the modern Gradle/Kotlin toolchain this app uses.
  # The custom-scheme (avatokauth) callback needs the plugin's CallbackActivity in
  # the manifest — injected by tool/postcreate.py (patch_web_auth_callback).
  flutter_web_auth_2: ^5.0.3
  # Google-only auth: NATIVE Google sign-in (no browser) → Clerk google_one_tap.
  google_sign_in: ^6.2.1
  # Native incoming-call UI (full-screen, lock-screen) + ConnectionService
  # Pinned to 2.x — 3.x rewrote the CallEvent/params API.
  flutter_callkit_incoming: ^2.5.8
  # Read the device address book (name / emails / phones) to find & invite friends.
  flutter_contacts: ^1.1.9+2
  # [AVADIAL-BACKUP-DAILY] OS-scheduled background work — the ~24h contact-book
  # backup (features/avadial/contacts_daily_backup.dart). Owner decision
  # 2026-07-15: contacts must be backed up even for a user who doesn't OPEN the
  # app for a week, which an app-lifecycle check by definition can't do; only the
  # OS can wake us. Wraps androidx.work.WorkManager. Adds NO runtime permission
  # and NO new user prompt (its manifest bits are merged by the plugin). NATIVE —
  # must be validated by a CI APK build (can't compile headless). Note WorkManager
  # guarantees eventual, not punctual, execution and OEM battery savers can defer
  # it further; the job is written to be idempotent + change-detected so a late or
  # doubled run is a no-op.
  #
  # Pinned to 0.9.x, NOT the long-familiar 0.5.2: that release predates AGP 8's
  # mandatory `namespace` and would fail this module's build outright (AGP 8.7 /
  # Gradle 8.10.2 / compileSdk 36). 0.9.x is also federated (workmanager_android
  # + workmanager_apple), and its API differs from 0.5.x — periodic work takes
  # `ExistingPeriodicWorkPolicy` (not `ExistingWorkPolicy`) and `isInDebugMode` on
  # initialize() is deprecated in favour of WorkmanagerDebug handlers.
  workmanager: ^0.9.0+3
  # Native share sheet for the "invite a friend" message + download link.
  share_plus: ^10.1.2
  # Copy a chat IMAGE to the system clipboard (paste into any app) — Flutter's
  # built-in Clipboard is text-only. Used by chat_thread.dart's full-screen photo
  # viewer + the long-press "Copy image" action. NATIVE: super_clipboard pulls a
  # Rust-based native extension (super_native_extensions via cargokit), so the CI
  # APK build runner MUST have the Rust toolchain installed (rustup) and Android
  # minSdk >= 23. Must be validated by a CI APK build (can't compile headless).
  super_clipboard: ^0.9.1
  # Local-first SQLite database (the WhatsApp model): on-device source of truth
  # for chats/messages/contacts with reactive queries (the UI watches the DB, so
  # navigation/cold-start read locally — instant — and the network only syncs new
  # rows in). sqlite3_flutter_libs bundles SQLite so FTS5 (+ future vector) work
  # the same on every device; with split-per-ABI it adds ~1.5MB.
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.18
  # ── On-device AI engine (Cactus) — REMOVED 2026-06-21 ─────────────────────
  # The Cactus on-device LLM was ripped out: it was too weak (hallucinated intent
  # + answers, ~8s TTFT, failed to init LFM2.5 on the shipped engine) and bloated
  # the APK with native libs. ALL generation/intent/tools are now the cloud
  # (Gemini 3). On-device we keep only the user's PRIVATE memory as SQLite FTS5
  # keyword search (core/ava_ondevice_rag.dart) — no native dep, FTS5 ships in
  # sqlite3_flutter_libs below. Voice TTS = KOKORO (Kokoro-82M, multilingual —
  # owner decision 2026-06-21, replacing the dropped Supertonic-3 plan); STT = the
  # on-device Whisper engine below. An optional ONNX embedding rerank is a separate,
  # later build.
  # On-device VOICE STACK — REMOVED 2026-06-26. The sherpa-onnx engine bundled a
  # ~30 MB native runtime (libonnxruntime/libsherpa) in the APK AND downloaded
  # ~130 MB of Whisper/VAD model files on first use. Speech-to-text ("Convert
  # voice to text") is now CLOUD Whisper via OpenRouter, behind the Worker route
  # POST /api/stt/transcribe (core/ava_ondevice_stt.dart). Ava's voice calls were
  # already online (Gemini Live), and on-device TTS was already removed — so the
  # entire native voice engine is gone. `sherpa_onnx` and `archive` (only used to
  # unpack the model tarballs) were dropped with it.
  # path joining (still used app-wide).
  path: ^1.9.0
  # Phase 4 (Two-Lane Memory) — on-device vector + embedder deps DEFERRED here by
  # Phase 0. DECISION: NO new packages are needed for the free on-device lane.
  #   • FTS5 keyword search → already available (sqlite3_flutter_libs bundles
  #     SQLite with FTS5; the ava_fts virtual table is created via raw SQL on the
  #     existing drift connection — see core/ava_memory/local_index.dart).
  #   • Vector search → 256-D embeddings stored as BLOB rows in the SAME per-
  #     account sqlite file and ranked by BRUTE-FORCE COSINE in pure Dart. At
  #     on-device message volumes this needs no native vector engine (no
  #     sqlite-vec / ObjectBox / ZVEC), so none is added.
  #   • Embedder runtime → on-device model INFERENCE is stubbed (deterministic
  #     256-D hashing embedder) because wiring a native ML runtime (LiteRT/ONNX)
  #     can't be compiled/verified headless and pinning an un-buildable native ML
  #     dep would risk the APK build. The interface + download-on-first-use
  #     scaffolding ship now; adding the runtime later is a one-class change with
  #     NO pubspec churn beyond that single runtime package. See INTEGRATION-NOTES.

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  # drift code generation (run via build_runner; CI regenerates on every build).
  drift_dev: ^2.16.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/ava/    # Ava's sitewide avatar (replace ava_avatar.png to change her face)
    - assets/sounds/
    - assets/audio/    # AI ringback feature: bundled fallback ringback + busy tone
    - assets/audio/catalog/   # bundled ringtone catalog (preview + set as default)
    - assets/models/   # AvaVision on-device vision models (MoveNet/MediaPipe Tasks)
    - assets/ai_studio/   # Google AI Studio key-setup step screenshots
    # STREAM E: built-in sticker packs (.webp) for the emoji/GIF/sticker panel.
    - assets/stickers/ava_hearts/
    - assets/stickers/ava_reactions/
    - assets/stickers/ava_paws/
    # Liveness V3 (Specs/LIVENESS-V3-VOICE-GUIDED-PLAN-DRAFT.md §1): English Ava
    # voice clips bundled in the APK so a check always works offline. Non-English
    # packs download from the CDN at runtime (kVoicePackCdnBase). Filenames MUST
    # match LivenessPackManifest in features/identity/liveness_v3/voice_packs.dart.
    - assets/liveness_voice/en/
  # AvaTOK design system fonts (bundled — offline-safe; see AVATOK-DESIGN-SYSTEM):
  # Nunito is the single app-wide font (owner request 2026-06-19).
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900

dependency_overrides:
  record: 6.2.1
