[[durable_objects.bindings]]
name = "AVA_AGENT"
class_name = "AvaAgentDO"

# Per-user backup/sync coordinator (P10): R2 premium cross-device sync.
[[durable_objects.bindings]]
name = "BACKUP"
class_name = "BackupDO"

# Ava Receptionist call bridge (one per session id). Holds a live Gemini Live WS
