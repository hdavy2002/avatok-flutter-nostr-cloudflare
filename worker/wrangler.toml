# State Sync Engine flags (worker/src/do/inbox.ts).
# SYNC_OPS_V2: per-conversation sequence stamping + op_appended telemetry. Default ON
#   in code ("!= '0'"); pinned here for clarity. Set "0" to disable stamping.
# SYNC_CONV_CURSOR_V2: Phase 1 switch-over — per-conversation catch-up (HTTP /sync?conv=
#   and the hybrid WS reply). SAFE: the hybrid payload is a strict SUPERSET of the plain
#   global sweep (never fewer messages), and it only activates for clients that report
#   `cc` per-conv positions in hello — current apps don't, so this is inert until the
#   cc-sending APK is installed. Set "0" (or unset) to disable.
SYNC_OPS_V2 = "1"
SYNC_CONV_CURSOR_V2 = "1"

# ---------------------------------------------------------------------------
# D1 — the database (Golden Rule 1). Four logical databases at launch.
# Relay starts single; sharding router (src/db/shard.ts) can fan to 16 later.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB_META"            # identity, profiles, contacts (hashed), follows, blocks, mutes, settings, push tokens, communities, strikes, verification
database_name = "avatok-meta"
database_id = "c4ec8c0e-e1ac-4a1d-8e41-636f4007871b"

[[d1_databases]]
binding = "DB_MEDIA"           # user_media metadata + perceptual hashes (AvaLibrary)
database_name = "avatok-media-meta"
database_id = "79dc846e-8d9c-416a-8927-39c7aebdc400"

[[d1_databases]]
binding = "DB_MODERATION"      # blocked hashes, moderation_results cache, user_reports
database_name = "avatok-moderation"
database_id = "770d5709-2974-447e-b4e8-8c43f22df997"

[[d1_databases]]
binding = "DB_BRAIN"           # AvaBrain knowledge graph + memory (own DB — event log is high-volume)
database_name = "avatok-brain"
database_id = "f5bfb712-5151-4e9f-b47a-20d76465f205"

[[d1_databases]]
binding = "DB_WALLET"          # AvaWallet audit trail (balance authority = WalletDO)
database_name = "avatok-wallet"
database_id = "63d7181c-0539-4ff2-8690-4ff9bb785457"

# ---------------------------------------------------------------------------
# R2 — blobs. READS are served from blossom.avatok.ai (public bucket + Cache
# Everything), NEVER through this Worker. The Worker only handles WRITES.
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "BLOBS"              # avatok-blobs — public bucket, key = sha256
bucket_name = "avatok-blobs"

[[r2_buckets]]
binding = "VERIFICATION"       # avatok-verification — LOCKED, no public access, presigned only
bucket_name = "avatok-verification"

[[r2_buckets]]
binding = "DIGITAL"            # avatok-digital — PRIVATE; OLX digital goods (signed download URLs)
bucket_name = "avatok-digital"

[[r2_buckets]]
binding = "AGENT_AUDIO"        # avatok-agent-audio — lazy agent-conversation TTS cache (Phase 8)
bucket_name = "avatok-agent-audio"

# Ava backup/sync (P10): premium cross-device sync + generated-image store
# (Nano Banana 2 outputs, P9). Encrypted at rest; no egress fees (we hold it).
# Create: wrangler r2 bucket create avatok-backup
[[r2_buckets]]
binding = "BACKUP_R2"
bucket_name = "avatok-backup"

# ---------------------------------------------------------------------------
# KV — ephemeral tokens ONLY (Golden Rule 5). 5 allowed uses, nothing else.
# upload tokens / rate-limit counters / NIP-05 cache / feature flags / CSRF.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "TOKENS"
id = "ab462ef0fdad44d08fd11263577b31f5"

# ---------------------------------------------------------------------------
# Queues — all async work (moderation, push, email). Consumers are separate
# Workers (see Phase 4). Never block a request on slow tasks.
# ---------------------------------------------------------------------------
[[queues.producers]]
binding = "Q_MODERATION"
queue = "moderation"

[[queues.producers]]
binding = "Q_PUSH"
queue = "push-notifications"

[[queues.producers]]
binding = "Q_EMAIL"
queue = "email"

[[queues.producers]]
binding = "Q_ANALYTICS"        # PostHog event batching — never call PostHog sync from a Worker
queue = "analytics"

[[queues.producers]]
binding = "Q_BRAIN"            # AvaBrain background extraction (public content only)
queue = "brain-events"

[[queues.producers]]
binding = "Q_DELETE"           # account-deletions (30-day-grace 15-store cascade, Phase 1)
queue = "account-deletions"

[[queues.producers]]
binding = "Q_WALLET"           # wallet-transactions (WalletDO → D1 audit trail, Phase 2)
queue = "wallet-transactions"

[[queues.producers]]
binding = "Q_AGENT"            # agent-tasks (agent conversations + per-app hooks, Phase 7)
queue = "agent-tasks"

[[queues.producers]]
binding = "Q_MONEY"            # money-settlements (refund/settlement engine, marketplace Phase 7)
queue = "money-settlements"

[[queues.producers]]
binding = "Q_ARCHIVE"          # chat-archive (Phase 1 ABLY-R2): message body → R2 + D1 index
queue = "chat-archive"         # NOTE: create once → `wrangler queues create chat-archive` (+ chat-archive-dlq)

[[queues.producers]]
binding = "Q_MKT_AUDIO"        # marketplace negotiation VOICE render (async → avatok-consumers)
queue = "mkt-audio"            # NOTE: create once → `wrangler queues create mkt-audio` (+ mkt-audio-dlq)

[[queues.producers]]
binding = "Q_AUTO_REPLY"       # STREAM F away auto-responder + away-digest jobs (async → avatok-consumers)
queue = "auto-reply"           # NOTE: create once → `wrangler queues create auto-reply` (+ auto-reply-dlq)

# [LIVE-QUEUE-1] liveness-verify — SELF-consumed (see [[queues.consumers]] below in
# THIS SAME worker, not avatok-consumers). runLivenessChecks does 8+ LLaVA calls
# and a Whisper call; moving it off the request's ctx.waitUntil onto a queue frees
# the Worker to serve other requests during a verify spike. Cross-package import of
# runLivenessChecks into consumers/ is forbidden (worker↔consumers split), so this
# queue is consumed by avatok-api itself (src/index.ts queue() handler), exactly
# like Q_MONEY below. NOTE: create once → `wrangler queues create liveness-verify`
# (+ liveness-verify-dlq) before this binding resolves; livenessVerify() falls back
# to ctx.waitUntil(runLivenessChecks(...)) if .send() throws (queue missing/unset).
[[queues.producers]]
binding = "LIVENESS_QUEUE"
queue = "liveness-verify"

# Contact-book chunking — SELF-consumed (see [[queues.consumers]] below), same
# pattern as liveness-verify. On PUT, contacts_backup.ts enqueues {uid} here to
# rebuild the encrypted R2 page-chunks + D1 manifest off the request lifecycle;
# scheduleChunk() falls back to ctx.waitUntil if .send() throws. Created via
# `scripts/cf.sh worker queues create contacts-chunk`.
[[queues.producers]]
binding = "Q_CONTACTS"
queue = "contacts-chunk"

# Phase 7: avatok-api consumes its OWN money queue — the engine lives next to
# the ledger primitives. 5 retries, then the DLQ (alert email + admin retry).
[[queues.consumers]]
queue = "money-settlements"
max_batch_size = 10
max_retries = 5
dead_letter_queue = "money-dlq"

[[queues.consumers]]
queue = "money-dlq"
max_batch_size = 10
max_retries = 3

# [LIVE-QUEUE-1] self-consumed liveness verify queue (see producer above). Low
# batch size — each message runs 8+ LLaVA calls + a Whisper call, so keep per-batch
# concurrency modest. No DLQ: a failed verify already has a safe terminal state
# (the client's poll simply times out and the user can retry — same UX as today's
# ctx.waitUntil path throwing).
[[queues.consumers]]
queue = "liveness-verify"
max_batch_size = 5
max_retries = 2

# Self-consumed contacts-chunk queue (see producer above). Handled by index.ts
# queue() → cbook.contactsChunkConsume → buildContactChunks. No DLQ: a failed
# chunk build is non-fatal (paged GET falls back to decrypt-and-slice, and the
# next backup PUT re-triggers chunking), same terminal-safe stance as liveness.
[[queues.consumers]]
queue = "contacts-chunk"
max_batch_size = 10
max_retries = 3

# ---------------------------------------------------------------------------
# Workers AI — image moderation on the /upload/public path only.
# ---------------------------------------------------------------------------
[ai]
binding = "AI"

# AI Search (managed RAG) — premium "memory & file search". Namespace binding
# (env.AI_SEARCH) so we create a PER-USER instance at runtime for isolation.
# Wrangler creates the 'default' namespace on deploy if missing.
[[ai_search_namespaces]]
binding = "AI_SEARCH"
namespace = "default"

# ---------------------------------------------------------------------------
# Observability — Workers Logs (7-day retention, included in paid plan).
# ---------------------------------------------------------------------------
[observability]
enabled = true

# ---------------------------------------------------------------------------
# Analytics Engine — operational metrics (API latency, relay throughput, queue
# depth). Complements PostHog (product analytics). Dataset auto-creates on first
# writeDataPoint — no provisioning step. $0.25/million writes.
# ---------------------------------------------------------------------------
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "avatok_metrics"

# ---------------------------------------------------------------------------
# Vectorize — semantic search (AvaDate match, AvaExplore search, AvaNews recs,
# AvaLibrary discovery, AvaAgent memory). Wire now, populate Phase 4.
# Create: wrangler vectorize create avatok-semantic --dimensions=384 --metric=cosine
# (384 dims = bge-small-en-v1.5 via Workers AI)
# ---------------------------------------------------------------------------
[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "avatok-semantic"

# ---------------------------------------------------------------------------
# Durable Object — group call rooms (SFU signaling). 1:1 calls stay P2P.
# WebSocket Hibernation so idle rooms cost ~nothing.
# ---------------------------------------------------------------------------
[[durable_objects.bindings]]
name = "CALL_ROOMS"
class_name = "CallRoom"

# Free-tier P2P mesh group-call signaling (≤5). Keyed by group id; hibernates idle.
[[durable_objects.bindings]]
name = "MESH_ROOMS"
class_name = "MeshRoom"

# CF Realtime SFU group-AUDIO room (≤32, active-speaker). Roster + active-speaker
# fan-out over hibernatable WS. Gated by groupAudioSfuEnabled (dormant).
[[durable_objects.bindings]]
name = "GROUP_CALL_ROOMS"
class_name = "GroupCallRoom"

# Per-user reasoning DO (AvaBrain). Keyed by npub; idles to nothing between asks.
[[durable_objects.bindings]]
name = "USER_BRAIN"
class_name = "UserBrain"

# Per-user atomic coin balance (AvaWallet). SQLite-backed; alarm releases 7-day holds.
[[durable_objects.bindings]]
name = "WALLET_DO"
class_name = "WalletDO"

# Per-stream gift aggregation (AvaLive). Batches gifts, settles to creator WalletDO.
[[durable_objects.bindings]]
name = "STREAM_SESSION_DO"
class_name = "StreamSessionDO"

# Per-user agent coordinator (rate-limit 5/app/day + per-user neuron budget).
[[durable_objects.bindings]]
name = "AGENT_DO"
class_name = "AgentDO"

# Per agent↔agent conversation (turn loop; self-destructs after 30 days).
[[durable_objects.bindings]]
name = "CONVERSATION_DO"
class_name = "ConversationDO"

# Per-user messaging inbox (Cloudflare-native pivot; Nostr deprecated). Holds the
# user's hibernatable WebSocket(s) + DO-local SQLite message log. Keyed by uid.
[[durable_objects.bindings]]
name = "INBOX"
class_name = "InboxDO"

# Guardian Sentinel per-user HOT CACHE (S1). SQLite-backed for the durable backend,
# but stores ONLY ephemeral caches (velocity windows, dedup ring, bucket scores) —
# NEVER a system of record; rehydrates from D1 (sentinel_evidence). DARK behind
# sentinelEnabled. Specs/GUARDIAN-SENTINEL-FINAL-PLAN-2026-07-06.md §S1.
[[durable_objects.bindings]]
name = "SENTINEL"
class_name = "SentinelDO"

# PartyKit realtime layer (ephemeral; replaces Ably). One DO per ROOM, holding the
# room's hibernatable WebSockets for the live-only layer (typing, presence,
# receipts, marketplace agent stream, viewer counts, …). No persistence — durable
# delivery stays on InboxDO. Keyed by idFromName(`${type}:${id}`).
[[durable_objects.bindings]]
name = "PARTY"
class_name = "PartyDO"

# ---------------------------------------------------------------------------
# Ava in-chat AI (Phase 0 — Foundations). Bindings wired now; the DO classes
# are IMPLEMENTED by later phases (AvaAgentDO = P3 in-thread agent loop;
# BackupDO = P10 R2 premium sync). The worker will not fully typecheck until
