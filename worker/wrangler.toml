# AvaTok API Worker — Rulebook-compliant backend (replaces the KV monolith).
# Golden Rules: D1 is the database; KV is ephemeral tokens only; R2 reads bypass
# the Worker (public bucket); Queues handle all async work; Service Bindings for
# Worker→Worker. See BACKEND_REBUILD_PLAN.md.
#
# database_id values are filled in after `wrangler d1 create` (Phase 1b).

name = "avatok-api"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Apex-zone custom domain. The long *.workers.dev host intermittently fails mobile
# DNS resolution (errno 7) on wifi/LTE transitions — fatal for the persistent
# InboxDO WebSocket. api.avatok.ai (zone avatok.ai, on Cloudflare) is far more
# resilient, exactly like the old relay.avatok.ai. Serves both HTTP and WSS.
[[routes]]
pattern = "api.avatok.ai"
custom_domain = true

[vars]
# Cloudflare AI Gateway (2026-06-18) — routes ALL AI (Workers-AI binding + Gemini
# image) through the 'avatok-ai' gateway for per-user metering, caching, and a
# spend cap. AI_GATEWAY_TOKEN (cf-aig-authorization for the authed gateway) is a
# SECRET (`wrangler secret put AI_GATEWAY_TOKEN`), never in this file.
AI_GATEWAY_ID = "avatok-ai"
CF_ACCOUNT_ID = "fd3dbf43f8e6d8bf65bd36b02eb0abb0"
BLOSSOM_BASE_URL = "https://blossom.avatok.ai"   # public R2 read host (no Worker in path)
FCM_PROJECT = "avatok-e19ef"
BRAIN_REASONER_MODEL = "@cf/google/gemma-4-26b-a4b-it"  # Gemma 4 26B-A4B MoE (~4B-class cost, thinking-mode reasoning)
BRAIN_EMBED_MODEL = "@cf/baai/bge-small-en-v1.5"            # 384-dim — matches avatok-semantic
BRAIN_RETRO_DELETE = "1"                                    # Phase 9: toggle OFF ⇒ retro-delete indexed items
POSTHOG_QUERY_HOST = "https://eu.posthog.com"               # investigate() reads (personal key) — EU: project 139917 lives on eu.posthog.com
POSTHOG_PROJECT_ID = "139917"
# AvaVision Agentic-Vision snapshot model ("Analyze my form", code execution on).
# Phase 0 PRICING.md §3 verified the exact id; preview may roll to GA gemini-3-flash.
AVAVISION_SNAPSHOT_MODEL = "gemini-3-flash-preview"
WALLET_TOPUP_ENABLED = "1"   # TEST MODE 2026-06-18 (sk_test) — set LIVE Stripe keys before real money-in
WALLET_RETURN_URL = "https://avatok.ai/wallet"
# Clerk JWT verification (public values, not secrets). Enabling these lets the
# Worker read the signed-in Clerk user id, which links the account to its Nostr
# key (clerk_nostr_link) and powers cross-device restore via GET /api/me.
CLERK_JWKS_URL = "https://clerk.avatok.ai/.well-known/jwks.json"
CLERK_ISSUER = "https://clerk.avatok.ai"
# Admins allowed to PUT /api/admin/config (remote kill switches, Phase 1 A2).
ADMIN_UIDS = "user_3AuqQadIDHJftJtTkLD0DtKM8MB"
# AvaTalk group conferencing (Phase 10 — LiveKit ≤25). LIVEKIT_URL is a var;
# LIVEKIT_API_KEY / LIVEKIT_API_SECRET are secrets (`wrangler secret put`).
# All three unset ⇒ /api/conference/* returns 503 (flag-gated).
LIVEKIT_URL = "wss://tocktube-gk81le6j.livekit.cloud"
# AvaAffiliate /a/:linkId web preview — Play badge package id (the Android
# applicationId from app/android/app/build.gradle.kts). APP_STORE_ID is
# deliberately NOT set (Android-only launch): unset ⇒ no App Store badge.
PLAY_PACKAGE_ID = "ai.avatok.avatok_call"
# Ava tool layer — Klavis Strata (self-hosted) base URL (P5). Placeholder; set to
# the real self-host origin before P5 ships. Unset/empty ⇒ tool routes 503.
STRATA_URL = ""

# ---------------------------------------------------------------------------
# D1 — the database (Golden Rule 1). Four logical databases at launch.
# Relay starts single; sharding router (src/db/shard.ts) can fan to 16 later.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB_META"            # identity, profiles, contacts (hashed), follows, blocks, mutes, settings, push tokens, communities, strikes, verification
database_name = "avatok-meta"
database_id = "c4ec8c0e-e1ac-4a1d-8e41-636f4007871b"

[[d1_databases]]
binding = "DB_MEDIA"           # user_media metadata + perceptual hashes (AvaLibrary)
database_name = "avatok-media-meta"
database_id = "79dc846e-8d9c-416a-8927-39c7aebdc400"

[[d1_databases]]
binding = "DB_MODERATION"      # blocked hashes, moderation_results cache, user_reports
database_name = "avatok-moderation"
database_id = "770d5709-2974-447e-b4e8-8c43f22df997"

[[d1_databases]]
binding = "DB_BRAIN"           # AvaBrain knowledge graph + memory (own DB — event log is high-volume)
database_name = "avatok-brain"
database_id = "f5bfb712-5151-4e9f-b47a-20d76465f205"

[[d1_databases]]
binding = "DB_WALLET"          # AvaWallet audit trail (balance authority = WalletDO)
database_name = "avatok-wallet"
database_id = "63d7181c-0539-4ff2-8690-4ff9bb785457"

# ---------------------------------------------------------------------------
# R2 — blobs. READS are served from blossom.avatok.ai (public bucket + Cache
# Everything), NEVER through this Worker. The Worker only handles WRITES.
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "BLOBS"              # avatok-blobs — public bucket, key = sha256
bucket_name = "avatok-blobs"

[[r2_buckets]]
binding = "VERIFICATION"       # avatok-verification — LOCKED, no public access, presigned only
bucket_name = "avatok-verification"

[[r2_buckets]]
binding = "DIGITAL"            # avatok-digital — PRIVATE; OLX digital goods (signed download URLs)
bucket_name = "avatok-digital"

[[r2_buckets]]
binding = "AGENT_AUDIO"        # avatok-agent-audio — lazy agent-conversation TTS cache (Phase 8)
bucket_name = "avatok-agent-audio"

# Ava backup/sync (P10): premium cross-device sync + generated-image store
# (Nano Banana 2 outputs, P9). Encrypted at rest; no egress fees (we hold it).
# Create: wrangler r2 bucket create avatok-backup
[[r2_buckets]]
binding = "BACKUP_R2"
bucket_name = "avatok-backup"

# ---------------------------------------------------------------------------
# KV — ephemeral tokens ONLY (Golden Rule 5). 5 allowed uses, nothing else.
# upload tokens / rate-limit counters / NIP-05 cache / feature flags / CSRF.
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "TOKENS"
id = "ab462ef0fdad44d08fd11263577b31f5"

# ---------------------------------------------------------------------------
# Queues — all async work (moderation, push, email). Consumers are separate
# Workers (see Phase 4). Never block a request on slow tasks.
# ---------------------------------------------------------------------------
[[queues.producers]]
binding = "Q_MODERATION"
queue = "moderation"

[[queues.producers]]
binding = "Q_PUSH"
queue = "push-notifications"

[[queues.producers]]
binding = "Q_EMAIL"
queue = "email"

[[queues.producers]]
binding = "Q_ANALYTICS"        # PostHog event batching — never call PostHog sync from a Worker
queue = "analytics"

[[queues.producers]]
binding = "Q_BRAIN"            # AvaBrain background extraction (public content only)
queue = "brain-events"

[[queues.producers]]
binding = "Q_DELETE"           # account-deletions (30-day-grace 15-store cascade, Phase 1)
queue = "account-deletions"

[[queues.producers]]
binding = "Q_WALLET"           # wallet-transactions (WalletDO → D1 audit trail, Phase 2)
queue = "wallet-transactions"

[[queues.producers]]
binding = "Q_AGENT"            # agent-tasks (agent conversations + per-app hooks, Phase 7)
queue = "agent-tasks"

[[queues.producers]]
binding = "Q_MONEY"            # money-settlements (refund/settlement engine, marketplace Phase 7)
queue = "money-settlements"

# Phase 7: avatok-api consumes its OWN money queue — the engine lives next to
# the ledger primitives. 5 retries, then the DLQ (alert email + admin retry).
[[queues.consumers]]
queue = "money-settlements"
max_batch_size = 10
max_retries = 5
dead_letter_queue = "money-dlq"

[[queues.consumers]]
queue = "money-dlq"
max_batch_size = 10
max_retries = 3

# ---------------------------------------------------------------------------
# Workers AI — image moderation on the /upload/public path only.
# ---------------------------------------------------------------------------
[ai]
binding = "AI"

# AI Search (managed RAG) — premium "memory & file search". Namespace binding
# (env.AI_SEARCH) so we create a PER-USER instance at runtime for isolation.
# Wrangler creates the 'default' namespace on deploy if missing.
[[ai_search_namespaces]]
binding = "AI_SEARCH"
namespace = "default"

# ---------------------------------------------------------------------------
# Observability — Workers Logs (7-day retention, included in paid plan).
# ---------------------------------------------------------------------------
[observability]
enabled = true

# ---------------------------------------------------------------------------
# Analytics Engine — operational metrics (API latency, relay throughput, queue
# depth). Complements PostHog (product analytics). Dataset auto-creates on first
# writeDataPoint — no provisioning step. $0.25/million writes.
# ---------------------------------------------------------------------------
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "avatok_metrics"

# ---------------------------------------------------------------------------
# Vectorize — semantic search (AvaDate match, AvaExplore search, AvaNews recs,
# AvaLibrary discovery, AvaAgent memory). Wire now, populate Phase 4.
# Create: wrangler vectorize create avatok-semantic --dimensions=384 --metric=cosine
# (384 dims = bge-small-en-v1.5 via Workers AI)
# ---------------------------------------------------------------------------
[[vectorize]]
binding = "VECTOR_INDEX"
index_name = "avatok-semantic"

# ---------------------------------------------------------------------------
# Browser Rendering — headless Chrome for link previews / OG images.
# Cache results in Cache API (same URL = same preview). No external service.
# ---------------------------------------------------------------------------
[browser]
binding = "BROWSER"

# ---------------------------------------------------------------------------
# Durable Object — group call rooms (SFU signaling). 1:1 calls stay P2P.
# WebSocket Hibernation so idle rooms cost ~nothing.
# ---------------------------------------------------------------------------
[[durable_objects.bindings]]
name = "CALL_ROOMS"
class_name = "CallRoom"

# Per-user reasoning DO (AvaBrain). Keyed by npub; idles to nothing between asks.
[[durable_objects.bindings]]
name = "USER_BRAIN"
class_name = "UserBrain"

# Per-user atomic coin balance (AvaWallet). SQLite-backed; alarm releases 7-day holds.
[[durable_objects.bindings]]
name = "WALLET_DO"
class_name = "WalletDO"

# Per-stream gift aggregation (AvaLive). Batches gifts, settles to creator WalletDO.
[[durable_objects.bindings]]
name = "STREAM_SESSION_DO"
class_name = "StreamSessionDO"

# Per-user agent coordinator (rate-limit 5/app/day + per-user neuron budget).
[[durable_objects.bindings]]
name = "AGENT_DO"
class_name = "AgentDO"

# Per agent↔agent conversation (turn loop; self-destructs after 30 days).
[[durable_objects.bindings]]
name = "CONVERSATION_DO"
class_name = "ConversationDO"

# Per-user messaging inbox (Cloudflare-native pivot; Nostr deprecated). Holds the
# user's hibernatable WebSocket(s) + DO-local SQLite message log. Keyed by uid.
[[durable_objects.bindings]]
name = "INBOX"
class_name = "InboxDO"

# ---------------------------------------------------------------------------
# Ava in-chat AI (Phase 0 — Foundations). Bindings wired now; the DO classes
# are IMPLEMENTED by later phases (AvaAgentDO = P3 in-thread agent loop;
# BackupDO = P10 R2 premium sync). The worker will not fully typecheck until
# those classes are exported from src/index.ts — expected & accepted (see
# Specs/ava-build/INTEGRATION-NOTES.md). Phase 11 reconciles before deploy.
# ---------------------------------------------------------------------------
# Per-user in-thread Ava agent loop (P3): summarisation, gate, posts ava/ava_status.
[[durable_objects.bindings]]
name = "AVA_AGENT"
class_name = "AvaAgentDO"

# Per-user backup/sync coordinator (P10): R2 premium cross-device sync.
[[durable_objects.bindings]]
name = "BACKUP"
class_name = "BackupDO"

# Ava Receptionist call bridge (one per session id). Holds a live Gemini Live WS
# (via AI Gateway) for a ≤2-min call. Specs/PROPOSAL-AI-RECEPTIONIST.md.
[[durable_objects.bindings]]
name = "RECEPTION_ROOM"
class_name = "ReceptionRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CallRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["UserBrain"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["WalletDO", "StreamSessionDO"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["AgentDO", "ConversationDO"]

[[migrations]]
tag = "v5"
new_sqlite_classes = ["InboxDO"]

# Ava in-chat AI (Phase 0). New SQLite-backed DOs land with their classes in P3
# (AvaAgentDO) / P10 (BackupDO). The migration is declared here so the binding
# contract is complete; the deploy that introduces the classes applies it.
[[migrations]]
tag = "v6"
new_sqlite_classes = ["AvaAgentDO", "BackupDO"]

# Ava Receptionist call bridge (Specs/PROPOSAL-AI-RECEPTIONIST.md).
[[migrations]]
tag = "v7"
new_sqlite_classes = ["ReceptionRoom"]

# Brain reasoning + observability config (vars; secrets set via wrangler):
#   BRAIN_REASONER_MODEL  — default @cf/meta/llama-3.1-8b-instruct-fp8 (8B)
#   POSTHOG_QUERY_HOST    — https://us.posthog.com (investigate reads)
#   POSTHOG_PROJECT_ID    — 139917
# Secret: POSTHOG_PERSONAL_API_KEY (phx_…) — gated; investigate no-ops if unset.

# Secrets (set via `wrangler secret put`, never committed):
#   CLERK_JWKS_URL, CLERK_ISSUER       — Clerk JWT verification (opt-in)
#   TURN_KEY_ID, TURN_KEY_API_TOKEN    — Cloudflare Realtime TURN credentials
#   BUNNY_API_KEY, BUNNY_LIBRARY_ID    — Bunny.net Stream video uploads
#   STREAM_WEBHOOK_SECRET              — Cloudflare Stream webhook HMAC (AvaLive)
# (Text/image moderation runs on Workers AI in avatok-consumers — no OpenAI.)

