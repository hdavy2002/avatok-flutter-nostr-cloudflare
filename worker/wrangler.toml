[[durable_objects.bindings]]
name = "RECEPTION_ROOM_CF"
class_name = "ReceptionRoomCf"

# Per-account call-state control-plane authority (Phase A plumbing only — dormant).
# Single writer for call/receptionist state (epoch CAS + lease + reservations).
# Specs/CALL-CONTROL-PLANE-UNIFIED-PLAN.md. DARK: no route reads/writes it yet;
