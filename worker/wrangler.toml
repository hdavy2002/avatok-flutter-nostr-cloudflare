# Ava AI Voice Agent DO (WP4, plan §4/§7 item 7) — Grok realtime bridge. DARK
# behind voiceAgent (routes/config.ts). Specs/PLAN-2026-07-11-dialpad-business-calls-ava-voice-agent.md.
