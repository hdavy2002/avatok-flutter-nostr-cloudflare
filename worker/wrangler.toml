# ═══════════════════════════════════════════════════════════════════════════
# STAGING (creator-marketplace Phase 1, audit A1). Deploy:
#   wrangler deploy --env staging        → avatok-api-staging @ api-staging.avatok.ai
# Fully separate state: -staging D1/R2/KV/queues. Vectorize/AI/Browser/Analytics
# Engine are shared with prod (read-mostly or cost-free to share; revisit if a
# phase needs isolated vectors). Secrets: `wrangler secret put X --env staging`
# with Stripe TEST keys / Wise sandbox per secrets/secret-values.env "# staging".
# ═══════════════════════════════════════════════════════════════════════════
[env.staging]
name = "avatok-api-staging"

[[env.staging.routes]]
pattern = "api-staging.avatok.ai"
custom_domain = true

[env.staging.vars]
TEST_CLOCK_ALLOWED = "1"   # Phase 7 A2 — refund-engine test clock (staging ONLY)
UPSTASH_REDIS_REST_URL = "https://crack-grackle-16293.upstash.io"   # GenUI template cache (token = secret)
BLOSSOM_BASE_URL = "https://blossom.avatok.ai"
FCM_PROJECT = "avatok-e19ef"
BRAIN_REASONER_MODEL = "@cf/google/gemma-4-26b-a4b-it"
BRAIN_EMBED_MODEL = "@cf/baai/bge-small-en-v1.5"
BRAIN_RETRO_DELETE = "1"
AVA_REASONER = "@cf/google/gemma-4-26b-a4b-it"        # AVA CORE Phase 0 (see top-level [vars])
AVA_REASONER_ALT = "google/gemini-2.5-flash-lite"
POSTHOG_QUERY_HOST = "https://eu.posthog.com"
POSTHOG_PROJECT_ID = "139917"
AVAVISION_SNAPSHOT_MODEL = "gemini-3-flash-preview"   # AvaVision snapshot model (PRICING.md §3)
WALLET_TOPUP_ENABLED = "1"   # staging: test-mode Stripe ON (2026-06-10)
WALLET_RETURN_URL = "https://avatok.ai/wallet"
STRIPE_PUBLISHABLE_KEY = "pk_test_51SZCqHJgoaTrScq1AvSiuZrl7OGF8OJrYNSvO7sNriLPtaGZRVColGpxgajHXUrLpcryoDfdIO4kK2vEENpmB2GL00Sphy2rVq"  # public; must match sk_test mode
CLERK_JWKS_URL = "https://clerk.avatok.ai/.well-known/jwks.json"
CLERK_ISSUER = "https://clerk.avatok.ai"
ADMIN_UIDS = "user_3AuqQadIDHJftJtTkLD0DtKM8MB"
PLAY_PACKAGE_ID = "ai.avatok.avatok_call"   # staging APK = applicationIdSuffix .staging, but the Play listing is the prod package
# Mirrored from prod (2026-07-01) so staging is a true clone: AI Gateway routing,
# the CF account id the receptionist CF-STT (Deepgram Nova) needs, and LiveKit.
AI_GATEWAY_ID = "avatok-ai"
CF_ACCOUNT_ID = "fd3dbf43f8e6d8bf65bd36b02eb0abb0"
LIVEKIT_URL = "wss://tocktube-gk81le6j.livekit.cloud"

[[env.staging.d1_databases]]
binding = "DB_META"
database_name = "avatok-meta-staging"
database_id = "3866e75b-89ab-4325-bbfa-4bef61395107"

[[env.staging.d1_databases]]
binding = "DB_MEDIA"
database_name = "avatok-media-meta-staging"
database_id = "33a9816d-7139-4eea-9ce9-57ed9cf955d6"

[[env.staging.d1_databases]]
binding = "DB_MODERATION"
database_name = "avatok-moderation-staging"
database_id = "04d887bd-3339-423b-97bd-f9bbfaf60a2b"

[[env.staging.d1_databases]]
binding = "DB_BRAIN"
database_name = "avatok-brain-staging"
database_id = "30a0507a-4ade-4c3f-817f-33abfc6cee82"

[[env.staging.d1_databases]]
binding = "DB_WALLET"
database_name = "avatok-wallet-staging"
database_id = "371e6b93-dc1e-4d35-91f0-f0c7573f1fb0"

[[env.staging.r2_buckets]]
binding = "BLOBS"
bucket_name = "avatok-blobs-staging"

[[env.staging.r2_buckets]]
binding = "VERIFICATION"
bucket_name = "avatok-verification-staging"

[[env.staging.r2_buckets]]
binding = "DIGITAL"
bucket_name = "avatok-digital-staging"

[[env.staging.r2_buckets]]
binding = "AGENT_AUDIO"
bucket_name = "avatok-agent-audio-staging"

[[env.staging.r2_buckets]]
binding = "BACKUP_R2"
bucket_name = "avatok-backup-staging"

[[env.staging.kv_namespaces]]
binding = "TOKENS"
id = "fbd93a113d634a29b89dd40ad8caff0d"

[[env.staging.queues.producers]]
binding = "Q_MODERATION"
queue = "moderation-staging"

[[env.staging.queues.producers]]
binding = "Q_PUSH"
queue = "push-notifications-staging"

[[env.staging.queues.producers]]
binding = "Q_EMAIL"
queue = "email-staging"

[[env.staging.queues.producers]]
binding = "Q_ANALYTICS"
queue = "analytics-staging"

[[env.staging.queues.producers]]
binding = "Q_BRAIN"
queue = "brain-events-staging"

[[env.staging.queues.producers]]
binding = "Q_DELETE"
queue = "account-deletions-staging"

[[env.staging.queues.producers]]
binding = "Q_WALLET"
queue = "wallet-transactions-staging"

[[env.staging.queues.producers]]
binding = "Q_AGENT"
queue = "agent-tasks-staging"

[[env.staging.queues.producers]]
binding = "Q_MONEY"
queue = "money-settlements-staging"

[[env.staging.queues.producers]]
binding = "Q_ARCHIVE"
queue = "chat-archive-staging"

[[env.staging.queues.producers]]
binding = "Q_AUTO_REPLY"
queue = "auto-reply-staging"

# [LIVE-QUEUE-1] mirrored on staging — create with `wrangler queues create
# liveness-verify-staging` before deploying --env staging with this producer live.
[[env.staging.queues.producers]]
binding = "LIVENESS_QUEUE"
queue = "liveness-verify-staging"

# Contacts-book chunking (mirrored on staging). Created via
# `scripts/cf.sh worker queues create contacts-chunk-staging`.
[[env.staging.queues.producers]]
binding = "Q_CONTACTS"
queue = "contacts-chunk-staging"

[[env.staging.queues.consumers]]
queue = "money-settlements-staging"
max_batch_size = 10
max_retries = 5
dead_letter_queue = "money-dlq-staging"

[[env.staging.queues.consumers]]
queue = "money-dlq-staging"
max_batch_size = 10
max_retries = 3

[[env.staging.queues.consumers]]
queue = "liveness-verify-staging"
max_batch_size = 5
max_retries = 2

[[env.staging.queues.consumers]]
queue = "contacts-chunk-staging"
max_batch_size = 10
max_retries = 3

[env.staging.ai]
binding = "AI"

# AI Search (managed RAG) — mirrored from prod 2026-07-01 so env.AI_SEARCH is
# bound on staging (was missing). Wrangler creates the 'default' namespace on deploy.
[[env.staging.ai_search_namespaces]]
binding = "AI_SEARCH"
namespace = "default"

[env.staging.observability]
enabled = true

[[env.staging.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "avatok_metrics_staging"

[[env.staging.vectorize]]
binding = "VECTOR_INDEX"
index_name = "avatok-semantic"

[[env.staging.durable_objects.bindings]]
name = "CALL_ROOMS"
class_name = "CallRoom"

[[env.staging.durable_objects.bindings]]
name = "MESH_ROOMS"
class_name = "MeshRoom"

[[env.staging.durable_objects.bindings]]
name = "GROUP_CALL_ROOMS"
class_name = "GroupCallRoom"

[[env.staging.durable_objects.bindings]]
name = "USER_BRAIN"
class_name = "UserBrain"

[[env.staging.durable_objects.bindings]]
name = "WALLET_DO"
class_name = "WalletDO"

[[env.staging.durable_objects.bindings]]
name = "STREAM_SESSION_DO"
class_name = "StreamSessionDO"

[[env.staging.durable_objects.bindings]]
name = "AGENT_DO"
class_name = "AgentDO"

[[env.staging.durable_objects.bindings]]
name = "CONVERSATION_DO"
class_name = "ConversationDO"

[[env.staging.durable_objects.bindings]]
name = "INBOX"
class_name = "InboxDO"

# Guardian Sentinel per-user hot-cache DO (S1) — mirrored from prod. DARK behind
# sentinelEnabled.
[[env.staging.durable_objects.bindings]]
name = "SENTINEL"
class_name = "SentinelDO"

# PartyKit realtime layer (mirrored from prod 2026-07-01) — ephemeral presence/
# typing/receipts/reactions. Was missing on staging, degrading those features.
[[env.staging.durable_objects.bindings]]
name = "PARTY"
class_name = "PartyDO"

# Ava in-chat AI (Phase 0) — see prod section for the typecheck caveat.
[[env.staging.durable_objects.bindings]]
name = "AVA_AGENT"
class_name = "AvaAgentDO"

[[env.staging.durable_objects.bindings]]
name = "BACKUP"
class_name = "BackupDO"

# Ava Receptionist call bridge (Specs/PROPOSAL-AI-RECEPTIONIST.md).
[[env.staging.durable_objects.bindings]]
name = "RECEPTION_ROOM"
class_name = "ReceptionRoom"

# Ava Receptionist — Cloudflare-native engine (separate). Specs/RECEPTIONIST-CF-PIPELINE.md.
[[env.staging.durable_objects.bindings]]
name = "RECEPTION_ROOM_CF"
class_name = "ReceptionRoomCf"

# Per-account call-state control-plane authority (Phase A plumbing only —
# dormant, mirrored from prod). Specs/CALL-CONTROL-PLANE-UNIFIED-PLAN.md.
[[env.staging.durable_objects.bindings]]
name = "CALL_STATE_AUTHORITY"
class_name = "CallStateAuthorityDO"

# Voicemail bot DO (WP3, mirrored from prod). DARK behind voicemailBot.
[[env.staging.durable_objects.bindings]]
name = "VOICEMAIL_ROOM"
class_name = "VoicemailRoom"

# Ava AI Voice Agent DO (WP4, mirrored from prod). DARK behind voiceAgent.
[[env.staging.durable_objects.bindings]]
name = "AGENT_VOICE_ROOMS"
class_name = "AgentVoiceRoom"

# [AVA-PSTN-AGENT-1] Vobiz PSTN live-agent bridge DO (mirrored from prod).
# DARK behind pstnAgentEnabled.
[[env.staging.durable_objects.bindings]]
name = "VOBIZ_AGENT_ROOM"
class_name = "VobizAgentRoom"

# [AVA-CAMP-B1-GATE] Per-user outbound-dial admission gate DO (mirrored from
# prod). DARK — campaignDialerEnabled defaults false.
[[env.staging.durable_objects.bindings]]
name = "DIALER_GATE"
class_name = "DialerGateDO"

