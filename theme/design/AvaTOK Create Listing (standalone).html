  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

C, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"7adcb356-97ca-444c-bd6e-c2db85f99298\"><\u002Fscript>\n<link rel=\"icon\" type=\"image/svg+xml\" href=\"ab18d4eb-eba1-4f86-b635-94a01322486e\">\n\n<style>\n  :root {\n    --ink: #1a1a1c;\n    --ink-2: #6b6b73;\n    --ink-3: #9a9aa3;\n    --surface: #ffffff;\n    --field: #f0f0f2;\n    --hair: #ececef;\n    --accent: #14b8a6;\n    --accent-d: #0f9b8c;\n    --coral: #f7585b;\n    --radius-card: 22px;\n  }\n  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }\n  html, body { margin: 0; height: 100%; }\n  body {\n    font-family: \"DM Sans\", system-ui, sans-serif;\n    background: #c9ccd4;\n    display: flex; align-items: center; justify-content: center;\n    min-height: 100vh; overflow: hidden;\n  }\n\n  /* ---- phone shell ---- */\n  #stage { width: 430px; height: 932px; transform-origin: center center; position: relative; }\n  .phone {\n    position: absolute; inset: 0; background: var(--surface);\n    border-radius: 46px;\n    box-shadow: 0 40px 90px -20px rgba(20,20,30,.45), 0 0 0 11px #15151a, 0 0 0 13px #2a2a31;\n    overflow: hidden; display: flex; flex-direction: column;\n  }\n  .statusbar {\n    height: 54px; flex: 0 0 auto; display: flex; align-items: flex-end; justify-content: space-between;\n    padding: 0 30px 6px; font-weight: 600; font-size: 15px; color: var(--ink); z-index: 60; position: relative;\n  }\n  .statusbar .right { display: flex; align-items: center; gap: 7px; }\n\n  /* ---- screen stack ---- */\n  .screens { flex: 1 1 auto; position: relative; overflow: hidden; }\n  .view {\n    position: absolute; inset: 0; display: none; flex-direction: column;\n    background: var(--surface);\n  }\n  .view.active { display: flex; }\n  .view.anim-fwd { animation: slideInR .32s cubic-bezier(.4,0,.2,1); }\n  .view.anim-back { animation: slideInL .32s cubic-bezier(.4,0,.2,1); }\n  @keyframes slideInR { from { transform: translateX(28%); opacity: .4; } to { transform: translateX(0); opacity: 1; } }\n  @keyframes slideInL { from { transform: translateX(-28%); opacity: .4; } to { transform: translateX(0); opacity: 1; } }\n  .view-scroll { flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }\n  .view-scroll::-webkit-scrollbar { display: none; }\n\n  /* ---- app bar ---- */\n  .appbar { display: flex; align-items: center; gap: 14px; padding: 8px 18px 10px; }\n  .iconbtn {\n    border: none; background: transparent; padding: 0; width: 40px; height: 40px;\n    color: var(--ink); display: grid; place-items: center; cursor: pointer; border-radius: 50%;\n    transition: background .15s;\n  }\n  .iconbtn:hover { background: var(--field); }\n  .appbar h1 {\n    font-family: \"Fredoka\", sans-serif; font-weight: 600; font-size: 27px; letter-spacing: -.4px; margin: 0; color: var(--ink); white-space: nowrap;\n  }\n  .appbar .spacer { margin-left: auto; }\n  .brand { font-family:\"Fredoka\",sans-serif; font-weight:600; font-size:27px; letter-spacing:-.4px; display:flex; align-items:center; gap:7px; }\n  .verified { color: var(--accent); display: grid; place-items: center; }\n\n  /* ===== MARKETPLACE ===== */\n  .search {\n    margin: 6px 18px 0; height: 50px; background: var(--field); border-radius: 14px;\n    display: flex; align-items: center; gap: 12px; padding: 0 16px; color: var(--ink-3); font-size: 15px;\n  }\n  .mchips { display: flex; gap: 10px; padding: 16px 18px 4px; overflow-x: auto; scrollbar-width: none; }\n  .mchips::-webkit-scrollbar { display: none; }\n  .mchip {\n    flex: 0 0 auto; border: none; background: var(--field); color: var(--ink);\n    font: inherit; font-weight: 600; font-size: 15px; padding: 10px 18px; border-radius: 999px; cursor: pointer;\n    display: inline-flex; align-items: center; gap: 7px; transition: background .15s, color .15s;\n  }\n  .mchip.active { background: var(--ink); color: #fff; }\n  .banner {\n    margin: 18px 18px 0; border-radius: var(--radius-card);\n    background: linear-gradient(112deg, #f7a14e 0%, #f7715c 48%, #f5587b 100%);\n    padding: 22px 24px 24px; color: #fff; position: relative; overflow: hidden;\n  }\n  .banner .eyebrow { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 12px; letter-spacing: 1.5px; opacity: .96; }\n  .banner h2 { font-family: \"Fredoka\", sans-serif; font-weight: 600; font-size: 25px; line-height: 1.18; margin: 12px 0 0; letter-spacing: -.2px; }\n  .banner .cta {\n    margin-top: 20px; border: none; background: #fff; color: var(--coral); white-space: nowrap;\n    font-family: \"Fredoka\", sans-serif; font-weight: 600; font-size: 17px; padding: 13px 24px; border-radius: 13px; cursor: pointer;\n    box-shadow: 0 8px 18px -8px rgba(0,0,0,.3); transition: transform .12s;\n  }\n  .banner .cta:active { transform: scale(.97); }\n  .empty-line { text-align: center; color: var(--ink-3); font-size: 16px; font-weight: 500; padding: 64px 30px; }\n\n  /* ===== MY LISTINGS ===== */\n  .listings-empty {\n    flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; justify-content: center;\n    text-align: center; color: var(--ink-2); padding: 0 44px; gap: 8px;\n  }\n  .listings-empty .big { font-family: \"Fredoka\", sans-serif; font-weight: 500; font-size: 21px; color: var(--ink); }\n  .listings-empty p { margin: 0; font-size: 15.5px; line-height: 1.5; color: var(--ink-2); text-wrap: pretty; }\n  .fab {\n    position: absolute; right: 20px; bottom: 24px; z-index: 5;\n    display: inline-flex; align-items: center; gap: 9px; border: none; cursor: pointer;\n    background: var(--accent); color: #fff; font-family: \"Fredoka\", sans-serif; font-weight: 600; font-size: 17px;\n    padding: 15px 22px; border-radius: 18px; box-shadow: 0 14px 26px -10px rgba(20,184,166,.7);\n    transition: transform .12s, box-shadow .12s;\n  }\n  .fab:active { transform: scale(.96); }\n\n  /* ===== STEPPER ===== */\n  .stepper { padding: 8px 20px 40px; }\n  .step { display: grid; grid-template-columns: 28px 1fr; column-gap: 16px; }\n  .rail { display: flex; flex-direction: column; align-items: center; }\n  .dot {\n    width: 28px; height: 28px; border-radius: 50%; flex: none; background: #c4c4cc; color: #fff;\n    display: grid; place-items: center; font-weight: 700; font-size: 14px;\n    transition: background .25s; position: relative; z-index: 1;\n  }\n  .step.active .dot, .step.done .dot { background: var(--accent); }\n  .line { width: 2px; flex: 1 1 auto; background: #dcdce1; min-height: 18px; margin: 3px 0; transition: background .25s; }\n  .step.active .line, .step.done .line { background: var(--accent); }\n  .step:last-child .line { display: none; }\n  .step-head {\n    font-family: \"Fredoka\", sans-serif; font-weight: 500; font-size: 22px; color: var(--ink);\n    padding: 1px 0 6px; cursor: pointer; letter-spacing: -.2px;\n  }\n  .step.todo .step-head { cursor: default; }\n  .step-body {\n    display: grid; grid-template-rows: 0fr; opacity: 0;\n    transition: grid-template-rows .32s cubic-bezier(.4,0,.2,1), opacity .25s;\n  }\n  .step.active .step-body { grid-template-rows: 1fr; opacity: 1; }\n  .step-body > .inner { overflow: hidden; min-height: 0; }\n  .step.active .step-body > .inner { padding: 4px 0 26px; }\n\n  /* form atoms */\n  .tf { position: relative; margin: 14px 0 6px; }\n  .tf label { display: block; font-size: 13px; color: var(--ink-2); font-weight: 600; margin-bottom: 7px; }\n  .tf input, .tf textarea {\n    width: 100%; border: none; border-bottom: 1.5px solid var(--hair); background: transparent;\n    font: inherit; font-size: 17px; color: var(--ink); padding: 6px 2px; outline: none; resize: none;\n    transition: border-color .18s;\n  }\n  .tf input::placeholder, .tf textarea::placeholder { color: var(--ink-3); }\n  .tf input:focus, .tf textarea:focus { border-bottom-color: var(--accent); }\n  .tf textarea { min-height: 64px; line-height: 1.45; }\n\n  .selectwrap { position: relative; }\n  .selectwrap iconify-icon { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); color: var(--ink-2); pointer-events: none; font-size: 20px; }\n  select.sel {\n    width: 100%; -webkit-appearance: none; appearance: none; border: none; border-bottom: 1.5px solid var(--hair);\n    background: transparent; font: inherit; font-size: 17px; color: var(--ink); padding: 8px 26px 8px 2px; outline: none; cursor: pointer;\n  }\n  select.sel:focus { border-bottom-color: var(--accent); }\n\n  .radio-opt { display: flex; gap: 14px; align-items: flex-start; padding: 14px 2px; cursor: pointer; }\n  .radio-ring {\n    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--ink-3); flex: none; margin-top: 2px;\n    display: grid; place-items: center; transition: border-color .18s;\n  }\n  .radio-opt.sel .radio-ring { border-color: var(--accent); }\n  .radio-ring::after { content: \"\"; width: 11px; height: 11px; border-radius: 50%; background: var(--accent); transform: scale(0); transition: transform .18s; }\n  .radio-opt.sel .radio-ring::after { transform: scale(1); }\n  .radio-opt .rt { font-family: \"Fredoka\", sans-serif; font-weight: 500; font-size: 18px; color: var(--ink); }\n  .radio-opt .rs { font-size: 14px; color: var(--ink-2); margin-top: 3px; line-height: 1.4; }\n\n  .hint { font-size: 13px; color: var(--ink-3); line-height: 1.5; margin: 10px 2px 0; text-wrap: pretty; }\n  .divider { height: 1px; background: var(--hair); margin: 22px 0 18px; }\n  .extras-h { font-family: \"Fredoka\", sans-serif; font-weight: 500; font-size: 17px; color: var(--ink); margin-bottom: 4px; }\n\n  .row { display: flex; align-items: center; gap: 14px; }\n  .row .grow { flex: 1 1 auto; }\n\n  /* switch */\n  .switch {\n    width: 50px; height: 30px; border-radius: 999px; background: #c9c9d1; position: relative; cursor: pointer; flex: none;\n    transition: background .2s;\n  }\n  .switch::after { content: \"\"; posi n            <div class=\"big\">No listings yet.<\u002Fdiv>\n            <p>Create a live event or consultation offering — it shows up in AvaExplore the moment you publish.<\u002Fp>\n          <\u002Fdiv>\n          <button class=\"fab\" onclick=\"go('v-new'); resetStepper();\">\n            <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n            New listing\n          <\u002Fbutton>\n        <\u002Fsection>\n\n        <!-- ============ NEW LISTING STEPPER ============ -->\n        <section class=\"view\" id=\"v-new\" data-screen-label=\"New listing\">\n          <div class=\"appbar\">\n            <button class=\"iconbtn\" aria-label=\"Back\" onclick=\"go('v-listings')\">\n              <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 12H5M11 18l-6-6 6-6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n            <h1>New listing<\u002Fh1>\n          <\u002Fdiv>\n          <div class=\"view-scroll\">\n            <div class=\"stepper\" id=\"stepper\">\n\n              <!-- STEP 1 -->\n              <div class=\"step active\" data-step=\"1\">\n                <div class=\"rail\"><div class=\"dot\">1<\u002Fdiv><div class=\"line\"><\u002Fdiv><\u002Fdiv>\n                <div>\n                  <div class=\"step-head\" onclick=\"goStep(1)\">What are you offering?<\u002Fdiv>\n                  <div class=\"step-body\"><div class=\"inner\">\n                    <div class=\"radio-opt sel\" data-offer=\"Live event\" onclick=\"pickOffer(this)\">\n                      <div class=\"radio-ring\"><\u002Fdiv>\n                      <div><div class=\"rt\">Live event<\u002Fdiv><div class=\"rs\">Stream to many viewers at a set time (AvaLive)<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"radio-opt\" data-offer=\"Consultation\" onclick=\"pickOffer(this)\">\n                      <div class=\"radio-ring\"><\u002Fdiv>\n                      <div><div class=\"rt\">Consultation<\u002Fdiv><div class=\"rs\">Bookable 1:1 or small-group sessions from your availability<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"step-actions\">\n                      <button class=\"btn-primary\" onclick=\"nextStep(1)\">Continue<\u002Fbutton>\n                      <button class=\"btn-text\" onclick=\"go('v-listings')\">Cancel<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- STEP 2 -->\n              <div class=\"step todo\" data-step=\"2\">\n                <div class=\"rail\"><div class=\"dot\">2<\u002Fdiv><div class=\"line\"><\u002Fdiv><\u002Fdiv>\n                <div>\n                  <div class=\"step-head\" onclick=\"goStep(2)\">Title &amp; description<\u002Fdiv>\n                  <div class=\"step-body\"><div class=\"inner\">\n                    <div class=\"tf\"><label>Title<\u002Flabel><input id=\"f-title\" placeholder=\"e.g. Vedic chart reading\" oninput=\"syncPreview()\"><\u002Fdiv>\n                    <div class=\"tf\"><label>Description<\u002Flabel><textarea id=\"f-desc\" placeholder=\"What attendees will get…\" oninput=\"syncPreview()\"><\u002Ftextarea><\u002Fdiv>\n                    <div class=\"tf\"><label>Category<\u002Flabel>\n                      <div class=\"selectwrap\">\n                        <select class=\"sel\" id=\"f-cat\" onchange=\"syncPreview()\">\n                          <option>📚 Teachers<\u002Foption>\n                          <option>🔮 Astrologers<\u002Foption>\n                          <option>🎓 Professors<\u002Foption>\n                        <\u002Fselect>\n                        <iconify-icon icon=\"ph:caret-down-bold\"><\u002Ficonify-icon>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"step-actions\">\n                      <button class=\"btn-primary\" onclick=\"nextStep(2)\">Continue<\u002Fbutton>\n                      <button class=\"btn-text\" onclick=\"goStep(1)\">Back<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- STEP 3 -->\n              <div class=\"step todo\" data-step=\"3\">\n                <div class=\"rail\"><div class=\"dot\">3<\u002Fdiv><div class=\"line\"><\u002Fdiv><\u002Fdiv>\n                <div>\n                  <div class=\"step-head\" onclick=\"goStep(3)\">Price &amp; schedule<\u002Fdiv>\n                  <div class=\"step-body\"><div class=\"inner\">\n                    <div class=\"tf\"><label>Price (USD)<\u002Flabel><input id=\"f-price\" type=\"text\" inputmode=\"decimal\" value=\"10\" oninput=\"syncPreview()\"><\u002Fdiv>\n                    <div class=\"hint\" style=\"margin-top:2px;\">0 = free<\u002Fdiv>\n                    <button class=\"pickbtn\" id=\"dtbtn\" onclick=\"openDate()\">\n                      <iconify-icon icon=\"ph:calendar-blank-bold\"><\u002Ficonify-icon><span id=\"dtlabel\">Pick date &amp; time<\u002Fspan>\n                    <\u002Fbutton>\n                    <div class=\"hint\">If the time conflicts with your calendar, publish will flag it (greyed slot).<\u002Fdiv>\n                    <div class=\"row\" style=\"margin-top:18px;\">\n                      <label style=\"font-size:14px;font-weight:600;color:var(--ink-2);\">Duration<\u002Flabel>\n                      <div class=\"selectwrap\" style=\"width:120px;\">\n                        <select class=\"sel\" id=\"f-dur\" onchange=\"syncPreview()\">\n                          <option>30 min<\u002Foption><option selected=\"\">60 min<\u002Foption><option>90 min<\u002Foption><option>120 min<\u002Foption>\n                        <\u002Fselect>\n                        <iconify-icon icon=\"ph:caret-down-bold\"><\u002Ficonify-icon>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"divider\"><\u002Fdiv>\n                    <div class=\"extras-h\">Pricing extras<\u002Fdiv>\n                    <div class=\"row\" style=\"margin-top:14px;\">\n                      <span class=\"grow\" style=\"font-size:16px;color:var(--ink);\">Early-bird discount<\u002Fspan>\n                      <div class=\"switch\" id=\"sw-eb\" onclick=\"toggleSw(this)\"><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"minicols\">\n                      <div class=\"grow\" style=\"font-size:15px;color:var(--ink-2);\">Promo code (optional)<\u002Fdiv>\n                      <div class=\"minicol\"><label>% off<\u002Flabel><input value=\"10\"><\u002Fdiv>\n                      <div class=\"minicol\"><label>Max …<\u002Flabel><input value=\"20\"><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"step-actions\">\n                      <button class=\"btn-primary\" onclick=\"nextStep(3)\">Continue<\u002Fbutton>\n                      <button class=\"btn-text\" onclick=\"goStep(2)\">Back<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- STEP 4 -->\n              <div class=\"step todo\" data-step=\"4\">\n                <div class=\"rail\"><div class=\"dot\">4<\u002Fdiv><div class=\"line\"><\u002Fdiv><\u002Fdiv>\n                <div>\n                  <div class=\"step-head\" onclick=\"goStep(4)\">Cover photos<\u002Fdiv>\n                  <div class=\"step-body\"><div class=\"inner\">\n                    <div class=\"uploadtile\" id=\"uptile\" onclick=\"addPhoto()\">\n                      <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 8.5A1.5 1.5 0 0 1 4.5 7H7l1.2-1.8A1 1 0 0 1 9 4.7h4.2\"><\u002Fpath><path d=\"M21 12v5.5A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5V8.5\"><\u002Fpath><circle cx=\"11\" cy=\"13\" r=\"3.2\"><\u002Fcircle><path d=\"M18 4v5M15.5 6.5h5\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fdiv>\n                    <div class=\"hint\">1–5 photos (at least one required). Served via Cloudflare (AVIF) and cached on devices.<\u002Fdiv>\n                    <div class=\"step-actions\">\n                      <button class=\"btn-primary\" onclick=\"nextStep(4)\">Continue<\u002Fbutton>\n                      <button class=\"btn-text\" onclick=\"goStep(3)\">Back<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- STEP 5 -->\n              <div class=\"step todo\" data-step=\"5\">\n                <div class=\"rail\"><div class=\"dot\">5<\u002Fdiv><div class=\"line\"><\u002Fdiv><\u002Fdiv>\n                <div>\n                  <div class=\"step-head\" onclick=\"goStep(5)\">Icons &amp; flags<\u002Fdiv>\n                  <div class=\"step-body\"><div class=\"inner\">\n                    <div class=\"tf\"><label>Country code (e.g. IN, US)<\u002Flabel><input id=\"f-cc\" value=\"IN\" maxlength=\"2\" style=\"text-transform:uppercase\" oninput=\"syncPreview()\"><\u002Fdiv>\n                    <div class=\"tf\"><label>Language (badge, optional)<\u002Flabel><input placeholder=\"e.g. Hindi\"><\u002Fdiv>\n                    <div class=\"row\" style=\"margin-top:18px;\">\n                      <span class=\"grow\" style=\"font-size:16px;color:var(--ink);\">18+ only<\u002Fspan>\n                      <div class=\"switch\" id=\"sw-18\" onclick=\"toggleSw(this)\"><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"divider\"><\u002Fdiv>\n                    <div class=\"vt-banner\">\n                      <div class=\"vt-text\">\n                        <div class=\"vt-title\"><iconify-icon icon=\"ph:globe-bold\" style=\"color:var(--accent)\"><\u002Ficonify-icon> Voice translation available<\u002Fdiv>\n                        <div class=\"vt-desc\">Attendees can hear you live in their own language. They pay $3/hour in AvaCoins on top of your price — your earnings are not affected.<\u002Fdiv>\n                      <\u002Fdiv>\n                      <div class=\"switch on\" id=\"sw-vt\" onclick=\"toggleSw(this); syncPreview();\"><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"tf\" style=\"margin-top:18px;\"><label>Language of transmission (the language you speak)<\u002Flabel>\n                      <div class=\"selectwrap\">\n                        <select class=\"sel\" id=\"f-lang\" onchange=\"syncPreview()\">\n                          <option>Korean<\u002Foption><option>English<\u002Foption><option>Hindi<\u002Foption><option>Spanish<\u002Foption><option>Japanese<\u002Foption>\n                        <\u002Fselect>\n                        <iconify-icon icon=\"ph:caret-down-bold\"><\u002Ficonify-icon>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"step-actions\">\n                      <button class=\"btn-primary\" onclick=\"nextStep(5)\">Continue<\u002Fbutton>\n                      <button class=\"btn-text\" onclick=\"goStep(4)\">Back<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- STEP 6 -->\n              <div class=\"step todo\" data-step=\"6\">\n                <div class=\"rail\"><div class=\"dot\">6<\u002Fdiv><div class=\"line\"><\u002Fdiv><\u002Fdiv>\n                <div>\n                  <div class=\"step-head\" onclick=\"goStep(6)\">Preview &amp; publish<\u002Fdiv>\n                  <div class=\"step-body\"><div class=\"inner\">\n                    <div class=\"preview\">\n                      <div class=\"img\"><span id=\"pv-img\" style=\"font-family:ui-monospace,monospace;font-size:12px;\">cover photo<\u002Fspan><\u002Fdiv>\n                      <div class=\"body\">\n                        <div class=\"toprow\">\n                          <div class=\"ttl\" id=\"pv-title\">Untitled listing<\u002Fdiv>\n                          <div class=\"prc\" id=\"pv-price\">$10<\u002Fdiv>\n                        <\u002Fdiv>\n                        <div class=\"pchips\">\n                          <span class=\"pchip\" id=\"pv-offer\"><iconify-icon icon=\"ph:broadcast-bold\"><\u002Ficonify-icon> Live event<\u002Fspan>\n                          <span class=\"pchip\" id=\"pv-when\"><iconify-icon icon=\"ph:clock-bold\"><\u002Ficonify-icon> Jun 12, 6:00 PM<\u002Fspan>\n                          <span class=\"pchip\" id=\"pv-dur\">60 min<\u002Fspan>\n                          <span class=\"pchip\" id=\"pv-flag\">🇮🇳 IN<\u002Fspan>\n                          <span class=\"pchip\" id=\"pv-vt\"><iconify-icon icon=\"ph:globe-bold\"><\u002Ficonify-icon> Voice translation available · speaks Korean<\u002Fspan>\n                          <span class=\"pchip\" id=\"pv-cat\">teachers<\u002Fspan>\n                        <\u002Fdiv>\n                        <div class=\"desc\" id=\"pv-desc\">Your description preview will appear here.<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div class=\"step-actions\">\n                      <button class=\"btn-primary btn-publish\" onclick=\"openIdentity()\">Publish<\u002Fbutton>\n                      <button class=\"btn-text\" onclick=\"goStep(5)\">Back<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n      <\u002Fdiv>\n\n      <!-- ===== date picker ===== -->\n      <div class=\"scrim\" id=\"scrim-date\">\n        <div class=\"dialog\">\n          <div class=\"dp-head\">\n            <div class=\"dp-kicker\">Select date<\u002Fdiv>\n            <div class=\"dp-date\"><span class=\"d\" id=\"dp-d\">Fri, Jun 12<\u002Fspan><iconify-icon icon=\"ph:pencil-simple\"><\u002Ficonify-icon><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"dp-monthbar\">\n            <div class=\"dp-month\">June 2026 <iconify-icon icon=\"ph:caret-down-bold\" style=\"font-size:15px;\"><\u002Ficonify-icon><\u002Fdiv>\n            <div class=\"dp-nav\"><iconify-icon icon=\"ph:caret-left\"><\u002Ficonify-icon><iconify-icon icon=\"ph:caret-right\"><\u002Ficonify-icon><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"dp-grid\" id=\"dp-grid\"><\u002Fdiv>\n          <div class=\"dp-foot\"><button onclick=\"closeScrim('scrim-date')\">Cancel<\u002Fbutton><button onclick=\"confirmDate()\">OK<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== time picker ===== -->\n      <div class=\"scrim\" id=\"scrim-time\">\n        <div class=\"dialog\">\n          <div class=\"tp-head\">Select time<\u002Fdiv>\n          <div class=\"tp-readout\">\n            <div class=\"tp-num on\" id=\"tp-h\">6<\u002Fdiv>\n            <div class=\"tp-colon\">:<\u002Fdiv>\n            <div class=\"tp-num\" id=\"tp-m\">00<\u002Fdiv>\n            <div class=\"tp-ampm\">\n              <button id=\"tp-am\" onclick=\"setMer('AM')\">AM<\u002Fbutton>\n              <button id=\"tp-pm\" class=\"on\" onclick=\"setMer('PM')\">PM<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tp-clock\" id=\"tp-clock\">\n            <div class=\"tp-hand\" id=\"tp-hand\"><div class=\"tp-knob\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"tp-center\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"tp-foot\">\n            <iconify-icon icon=\"ph:keyboard\" class=\"tp-kb\"><\u002Ficonify-icon>\n            <button onclick=\"backToDate()\">Cancel<\u002Fbutton><button onclick=\"confirmTime()\">OK<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== identity sheet ===== -->\n      <div class=\"scrim bottom\" id=\"scrim-id\">\n        <div class=\"sheet\">\n          <div class=\"grab\"><\u002Fdiv>\n          <div class=\"shield\"><iconify-icon icon=\"ph:shield-check-fill\" style=\"font-size:52px;\"><\u002Ficonify-icon><\u002Fdiv>\n          <h3>Verify your identity<\u002Fh3>\n          <p class=\"p1\">We need to verify your identity before you can publish a listing. You'll photograph a government ID and take a quick selfie — it usually takes under two minutes.<\u002Fp>\n          <p class=\"p2\">Your documents are processed securely by Stripe Identity. AvaTOK never stores your ID images.<\u002Fp>\n          <button class=\"start\" onclick=\"startVerify()\">Start verification<\u002Fbutton>\n          <button class=\"notnow\" onclick=\"closeScrim('scrim-id')\">Not now<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"toast\" id=\"toast\"><\u002Fdiv>\n\n      <div class=\"home-ind\"><div><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <script>\n    /* ---- fit ---- */\n    function fit() {\n      const stage = document.getElementById('stage'), pad = 28;\n      const s = Math.min((innerWidth - pad) / 430, (innerHeight - pad) / 932);\n      stage.style.transform = 'scale(' + Math.min(s, 1) + ')';\n    }\n    addEventListener('resize', fit); fit();\n\n    /* ---- screen nav ---- */\n    const order = ['v-market','v-listings','v-new'];\n    function go(id) {\n      const cur = document.querySelector('.view.active');\n      const next = document.getElementById(id);\n      if (cur === next) return;\n      const goingForward = !cur || order.indexOf(id) > order.indexOf(cur.id);\n      if (cur) cur.classList.remove('active','anim-fwd','anim-back');\n      next.classList.remove('anim-fwd','anim-back');\n      next.classList.add('active', goingForward ? 'anim-fwd' : 'anim-back');\n      next.querySelector('.view-scroll')?.scrollTo(0,0);\n    }\n\n    /* ---- stepper ---- */\n    let active = 1;\n    function renderSteps() {\n      document.querySelectorAll('.step').forEach(st => {\n        const n = +st.dataset.step;\n        st.classList.remove('active','done','todo');\n        if (n === active) st.classList.add('active');\n        else if (n < active) st.classList.add('done');\n        else st.classList.add('todo');\n      });\n    }\n    function goStep(n) {\n      // can only jump to current or already-reached steps\n      const target = document.querySelector('.step[data-step=\"'+n+'\"]');\n      if (target.classList.contains('todo')) return;\n      active = n; renderSteps();\n      if (n === 6) syncPreview();\n    }\n    function nextStep(n) {\n      active = Math.min(6, n + 1); renderSteps();\n      if (active === 6) syncPreview();\n      const el = document.querySelector('.step[data-step=\"'+active+'\"]');\n      el.scrollIntoViewIfNeeded ? el.scrollIntoViewIfNeeded() : null;\n    }\n    function resetStepper() { active = 1; renderSteps(); }\n\n    function pickOffer(el) {\n      document.querySelectorAll('[data-offer]').forEach(o => o.classList.remove('sel'));\n      el.classList.add('sel'); syncPreview();\n    }\n    function toggleSw(el) { el.classList.toggle('on'); }\n\n    let photoAdded = false;\n    function addPhoto() {\n      photoAdded = true;\n      document.getElementById('pv-img').textContent = 'cover photo added';\n      toast('Photo added — 1 of 5');\n    }\n\n    /* ---- date picker ---- */\n    // June 2026: Jun 1 = Monday. today = 11, selected = 12\n    let selDay = 12, tmpDay = 12;\n    const monthDays = 30, firstCol = 1; // 0=Sun..6=Sat ; Monday=1\n    function buildGrid() {\n      const wd = ['S','M','T','W','T','F','S'];\n      let html = wd.map(d => '<div class=\"wd\">'+d+'<\u002Fdiv>').join('');\n      for (let i=0;i<firstCol;i++) html += '<div><\u002Fdiv>';\n      for (let d=1; d<=monthDays; d++) {\n        let cls = 'dp-cell';\n        if (d < 11) cls += ' mut';            // past days greyed\n        if (d === 11) cls += ' today';\n        if (d === tmpDay) cls += ' sel';\n        html += '<div class=\"'+cls+'\" onclick=\"pickDay('+d+')\">'+d+'<\u002Fdiv>';\n      }\n      document.getElementById('dp-grid').innerHTML = html;\n      const names = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];\n      const dow = (firstCol + tmpDay - 1) % 7;\n      document.getElementById('dp-d').textContent = names[dow] + ', Jun ' + tmpDay;\n    }\n    function pickDay(d) { tmpDay = d; buildGrid(); }\n    function openDate() { tmpDay = selDay; buildGrid(); showScrim('scrim-date'); }\n    function confirmDate() { selDay = tmpDay; closeScrim('scrim-date'); openTime(); }\n\n    /* ---- time picker ---- */\n    let mer = 'PM', selHour = 6, selMin = 0;\n    const clockNums = [\n      {n:12, a:-90},{n:1,a:-60},{n:2,a:-30},{n:3,a:0},{n:4,a:30},{n:5,a:60},\n      {n:6,a:90},{n:7,a:120},{n:8,a:150},{n:9,a:180},{n:10,a:210},{n:11,a:240}\n    ];\n    function buildClock() {\n      const clk = document.getElementById('tp-clock');\n      clk.querySelectorAll('.tp-n').forEach(e => e.remove());\n      const R = 90, cx = 116, cy = 116;\n      clockNums.forEach(o => {\n        const rad = o.a * Math.PI/180;\n        const x = cx + R*Math.cos(rad), y = cy + R*Math.sin(rad);\n        const el = document.createElement('div');\n        el.className = 'tp-n' + (o.n===selHour?' sel':'');\n        el.style.left = x+'px'; el.style.top = y+'px';\n        el.textContent = o.n;\n        el.onclick = () => setHour(o.n);\n        clk.appendChild(el);\n      });\n      const angle = ((selHour % 12) - 6) * 30; // 6 o'clock = straight down (0deg)\n      document.getElementById('tp-hand').style.transform = 'translateX(-50%) rotate('+angle+'deg)';\n      document.getElementById('tp-h').textContent = selHour;\n      document.getElementById('tp-m').textContent = String(selMin).padStart(2,'0');\n    }\n    function setHour(n){ selHour=n; buildClock(); }\n    function setMer(m){ mer=m; document.getElementById('tp-am').classList.toggle('on',m==='AM'); document.getElementById('tp-pm').classList.toggle('on',m==='PM'); }\n    function openTime() { buildClock(); showScrim('scrim-time'); }\n    function backToDate(){ closeScrim('scrim-time'); }\n    function fmtTime(){ return selHour + ':' + String(selMin).padStart(2,'0') + ' ' + mer; }\n    function confirmTime() {\n      closeScrim('scrim-time');\n      const btn = document.getElementById('dtbtn'); btn.classList.add('set');\n      document.getElementById('dtlabel').textContent = 'Jun ' + selDay + ', ' + fmtTime();\n      syncPreview();\n    }\n\n    /* ---- scrims ---- */\n    function showScrim(id){ document.getElementById(id).classList.add('show'); }\n    function closeScrim(id){ document.getElementById(id).classList.remove('show'); }\n    document.querySelectorAll('.scrim').forEach(s => s.addEventListener('click', e => { if (e.target === s) s.classList.remove('show'); }));\n\n    /* ---- identity ---- */\n    function openIdentity(){ showScrim('scrim-id'); }\n    function startVerify(){ closeScrim('scrim-id'); toast('Opening Stripe Identity…'); }\n\n    /* ---- preview sync ---- */\n    function syncPreview() {\n      const title = (document.getElementById('f-title').value || '').trim();\n      document.getElementById('pv-title').textContent = title || 'Untitled listing';\n      const desc = (document.getElementById('f-desc').value || '').trim();\n      document.getElementById('pv-desc').textContent = desc || 'Your description preview will appear here.';\n      const price = (document.getElementById('f-price').value || '0').trim();\n      document.getElementById('pv-price').textContent = (price === '0' || price === '') ? 'Free' : '$' + price;\n      const offer = document.querySelector('[data-offer].sel')?.dataset.offer || 'Live event';\n      const offerIcon = offer === 'Live event' ? 'ph:broadcast-bold' : 'ph:user-bold';\n      document.getElementById('pv-offer').innerHTML = '<iconify-icon icon=\"'+offerIcon+'\"><\u002Ficonify-icon> ' + offer;\n      document.getElementById('pv-dur').textContent = document.getElementById('f-dur').value;\n      const cc = (document.getElementById('f-cc').value || '').toUpperCase();\n      const flags = {IN:'🇮🇳',US:'🇺🇸',GB:'🇬🇧',KR:'🇰🇷',JP:'🇯🇵',ES:'🇪🇸',DE:'🇩🇪',FR:'🇫🇷',BR:'🇧🇷',CA:'🇨🇦'};\n      document.getElementById('pv-flag').textContent = (flags[cc]||'🏳️') + ' ' + (cc||'—');\n      const cat = document.getElementById('f-cat').value.replace(/^[^\\s]+\\s/,'').toLowerCase();\n      document.getElementById('pv-cat').textContent = cat;\n      const vtOn = document.getElementById('sw-vt').classList.contains('on');\n      const lang = document.getElementById('f-lang').value;\n      const vtChip = document.getElementById('pv-vt');\n      vtChip.style.display = vtOn ? '' : 'none';\n      vtChip.innerHTML = '<iconify-icon icon=\"ph:globe-bold\"><\u002Ficonify-icon> Voice translation available · speaks ' + lang;\n      document.getElementById('pv-when').innerHTML = '<iconify-icon icon=\"ph:clock-bold\"><\u002Ficonify-icon> Jun ' + selDay + ', ' + fmtTime();\n    }\n\n    /* ---- toast ---- */\n    let toastT;\n    function toast(msg) {\n      const t = document.getElementById('toast');\n      t.innerHTML = '<iconify-icon icon=\"ph:check-circle-fill\"><\u002Ficonify-icon>' + msg;\n      t.classList.add('show'); clearTimeout(toastT);\n      toastT = setTimeout(()=>t.classList.remove('show'), 2200);\n    }\n\n    /* ---- mchip toggle ---- */\n    document.querySelectorAll('.mchip').forEach(c => c.addEventListener('click', () => {\n      document.querySelector('.mchip.active')?.classList.remove('active'); c.classList.add('active');\n    }));\n\n    renderSteps();\n    syncPreview();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
