name = "avatok-call-signaling"
main = "src/index.ts"
compatibility_date = "2025-05-01"

# WebSocket room signaling for WebRTC (P2P) — aligned with spec §5 (DO per room).
# This is the NEW app's signaling; nothing here is reused from old avatok infra.

[vars]
FCM_PROJECT = "avatok-e19ef"

[[kv_namespaces]]
binding = "PUSH"
id = "55337b88a02149adb3bb221a708b8862"

# Encrypted, content-addressed chat media (Blossom-style). Server holds ciphertext only.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "avatok-media"

# Cloudflare Realtime (Calls) SFU app for group calls — set as secrets:
#   wrangler secret put CALLS_APP_ID
#   wrangler secret put CALLS_APP_SECRET

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]
